<!doctype html>
<html lang="%paraglide.lang%" dir="%paraglide.dir%" class="h-full">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico?v=2" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg?v=2" type="image/svg+xml" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0c0c0f" />

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="EarnMaze" />

			rel="stylesheet"
		/>

	<body data-sveltekit-preload-data="hover" class="h-full font-sans antialiased">
		<div style="display: contents">%sveltekit.body%</div>
