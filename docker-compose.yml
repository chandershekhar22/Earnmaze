services:
  db:
    image: postgres:16-alpine
    container_name: earnmaze-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: earnmaze
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d earnmaze"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        set -euo pipefail
        echo "Ensuring database em_celery exists..."
        if ! psql -h db -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='em_celery'" | grep -q 1; then
          psql -h db -U postgres -d postgres -c "CREATE DATABASE em_celery;"
        fi
        echo "Done."

  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    container_name: earnmaze-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: dev
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
