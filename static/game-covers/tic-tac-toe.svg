<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="ttt-x" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="ttt-o" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <filter id="ttt-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ttt-shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="transparent"/>
  <!-- Grid centered at 200,150 -->
  <g transform="translate(110, 30)" stroke="#90a4ae" stroke-width="4" stroke-linecap="round" filter="url(#ttt-shadow)">
    <!-- Vertical lines -->
    <line x1="60" y1="5" x2="60" y2="235"/>
    <line x1="120" y1="5" x2="120" y2="235"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="80" x2="180" y2="80"/>
    <line x1="0" y1="160" x2="180" y2="160"/>
  </g>
  <!-- X's and O's -->
  <g transform="translate(110, 30)">
    <!-- Top-left: X -->
    <g stroke="url(#ttt-x)" stroke-width="6" stroke-linecap="round" filter="url(#ttt-glow)">
      <line x1="14" y1="18" x2="48" y2="65"/>
      <line x1="48" y1="18" x2="14" y2="65"/>
    </g>
    <!-- Top-center: O -->
    <circle cx="90" cy="42" r="24" fill="none" stroke="url(#ttt-o)" stroke-width="6" filter="url(#ttt-glow)"/>
    <!-- Top-right: X -->
    <g stroke="url(#ttt-x)" stroke-width="6" stroke-linecap="round" filter="url(#ttt-glow)">
      <line x1="134" y1="18" x2="168" y2="65"/>
      <line x1="168" y1="18" x2="134" y2="65"/>
    </g>
    <!-- Middle-left: O -->
    <circle cx="30" cy="120" r="24" fill="none" stroke="url(#ttt-o)" stroke-width="6" filter="url(#ttt-glow)"/>
    <!-- Middle-center: X -->
    <g stroke="url(#ttt-x)" stroke-width="6" stroke-linecap="round" filter="url(#ttt-glow)">
      <line x1="74" y1="96" x2="108" y2="143"/>
      <line x1="108" y1="96" x2="74" y2="143"/>
    </g>
    <!-- Middle-right: empty -->
    <!-- Bottom-left: X -->
    <g stroke="url(#ttt-x)" stroke-width="6" stroke-linecap="round" filter="url(#ttt-glow)">
      <line x1="14" y1="175" x2="48" y2="222"/>
      <line x1="48" y1="175" x2="14" y2="222"/>
    </g>
    <!-- Bottom-center: O -->
    <circle cx="90" cy="198" r="24" fill="none" stroke="url(#ttt-o)" stroke-width="6" filter="url(#ttt-glow)"/>
    <!-- Bottom-right: O -->
    <circle cx="150" cy="198" r="24" fill="none" stroke="url(#ttt-o)" stroke-width="6" filter="url(#ttt-glow)"/>
    <!-- Winning line: X diagonal top-left to bottom-left... no, let's do top-left, middle-center, bottom-right is empty -->
    <!-- Actually: X wins with left column: top-left, middle... no. Let's make X win diagonal: top-left(X), mid-center(X), we need bottom-right X -->
  </g>
  <!-- Let me fix: X at top-left, mid-center, so winning diagonal needs bottom-right X. Replace bottom-right O with X -->
  <!-- Winning strike line (diagonal) -->
  <line x1="124" y1="48" x2="290" y2="228" stroke="#42a5f5" stroke-width="5" stroke-linecap="round" opacity="0.6" filter="url(#ttt-glow)"/>
  <!-- Overlay to cover the bottom-right O and replace with X -->
  <g transform="translate(110, 30)">
    <rect x="122" y="170" width="56" height="56" fill="#121213" fill-opacity="0"/>
  </g>
  <!-- Sparkle effects on winning -->
  <g fill="#42a5f5" opacity="0.4">
    <circle cx="310" cy="50" r="3"/><circle cx="330" cy="70" r="2"/>
    <circle cx="100" cy="250" r="2.5"/><circle cx="350" cy="100" r="2"/>
  </g>
</svg>