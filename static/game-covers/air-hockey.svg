<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0a1a2e"/>
  <!-- table outline -->
  <rect x="20" y="20" width="360" height="260" fill="#0a1a2e" stroke="#56a8ff" stroke-width="2" rx="6"/>
  <!-- center line -->
  <line x1="20" y1="150" x2="380" y2="150" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- center circle -->
  <circle cx="200" cy="150" r="50" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- goals -->
  <rect x="140" y="20" width="120" height="6" fill="rgba(255,48,80,0.3)"/>
  <rect x="140" y="274" width="120" height="6" fill="rgba(86,168,255,0.3)"/>
  <!-- mallets -->
  <g>
    <circle cx="200" cy="80" r="28" fill="#ff3050" stroke="#a0010" stroke-width="3"/>
    <circle cx="200" cy="80" r="22" fill="none" stroke="#ff3050" stroke-width="3"/>
    <circle cx="200" cy="80" r="8" fill="rgba(255,255,255,0.3)"/>
  </g>
  <g>
    <circle cx="200" cy="220" r="28" fill="#56a8ff" stroke="#0a2050" stroke-width="3"/>
    <circle cx="200" cy="220" r="22" fill="none" stroke="#56a8ff" stroke-width="3"/>
    <circle cx="200" cy="220" r="8" fill="rgba(255,255,255,0.3)"/>
  </g>
  <!-- puck with motion blur -->
  <ellipse cx="180" cy="160" rx="20" ry="12" fill="rgba(50,50,50,0.4)"/>
  <circle cx="200" cy="160" r="14" fill="#222" stroke="#444" stroke-width="2"/>
  <text x="100" y="160" font-family="monospace" font-weight="bold" font-size="40" fill="#ff3050" text-anchor="middle">2</text>
  <text x="300" y="160" font-family="monospace" font-weight="bold" font-size="40" fill="#56a8ff" text-anchor="middle">5</text>
</svg>
