<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="ar-bg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#2a0540"/><stop offset="100%" stop-color="#000"/></radialGradient>
    <filter id="ar-glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#ar-bg)"/>
  <!-- Tube perspective -->
  <g stroke="#ff3a6a" stroke-width="2" fill="none" filter="url(#ar-glow)">
    <polygon points="200,150 120,100 90,150 120,200"/>
    <polygon points="200,150 160,110 140,150 160,190"/>
    <polygon points="200,150 180,130 175,150 180,170"/>
  </g>
  <g stroke="#8a2aff" stroke-width="2" fill="none" filter="url(#ar-glow)">
    <polygon points="200,150 280,100 310,150 280,200"/>
    <polygon points="200,150 240,110 260,150 240,190"/>
    <polygon points="200,150 220,130 225,150 220,170"/>
  </g>
  <g stroke="#4ff0dc" stroke-width="1.5" opacity="0.5"><line x1="200" y1="150" x2="60" y2="20"/><line x1="200" y1="150" x2="340" y2="20"/><line x1="200" y1="150" x2="60" y2="280"/><line x1="200" y1="150" x2="340" y2="280"/></g>
  <!-- Claw (player) -->
  <g filter="url(#ar-glow)" transform="translate(120,100)"><path d="M-14,-10 L-8,0 L-14,10 M14,-10 L8,0 L14,10 M-8,0 L8,0" stroke="#ffe066" stroke-width="3" fill="none" stroke-linecap="round"/></g>
  <!-- Enemies -->
  <g fill="#ff3a6a" filter="url(#ar-glow)">
    <polygon points="200,80 208,92 200,100 192,92"/>
    <polygon points="260,120 268,132 260,140 252,132"/>
    <polygon points="140,180 148,192 140,200 132,192"/>
    <polygon points="270,200 278,212 270,220 262,212"/>
  </g>
  <!-- Bullets -->
  <g stroke="#ffe066" stroke-width="2" filter="url(#ar-glow)"><line x1="150" y1="110" x2="170" y2="120"/><line x1="130" y1="120" x2="115" y2="130"/></g>
  <g font-family="monospace" fill="#ff3a6a" font-weight="bold"><text x="20" y="28" font-size="11">00</text><text x="20" y="50" font-size="22">04850</text></g>
  <g font-family="monospace" fill="#4ff0dc" text-anchor="end" font-weight="bold"><text x="380" y="28" font-size="11">LEVEL</text><text x="380" y="50" font-size="22">07</text></g>
</svg>
