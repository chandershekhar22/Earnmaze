<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="ch-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d9b5"/>
      <stop offset="100%" stop-color="#e8c99b"/>
    </linearGradient>
    <linearGradient id="ch-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b58863"/>
      <stop offset="100%" stop-color="#8c6242"/>
    </linearGradient>
    <linearGradient id="ch-white-p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d9d9d9"/>
    </linearGradient>
    <linearGradient id="ch-black-p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="ch-shadow"><feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.35"/></filter>
    <filter id="ch-glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="#1a1a2e" fill-opacity="0.25"/>
  <g transform="translate(80,20) rotate(-4 120 130)">
