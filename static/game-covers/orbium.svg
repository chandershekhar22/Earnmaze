<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="or-bg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#1a2a4a"/><stop offset="100%" stop-color="#020418"/></radialGradient>
    <filter id="or-glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#or-bg)"/>
  <!-- Orbits -->
  <g transform="translate(200,150)" fill="none" stroke-width="1.5" opacity="0.5">
    <ellipse rx="120" ry="40" stroke="#4ff0dc"/>
    <ellipse rx="100" ry="80" stroke="#ff8fa8" transform="rotate(30)"/>
    <ellipse rx="80" ry="110" stroke="#ffe066" transform="rotate(-20)"/>
  </g>
  <!-- Central sun -->
  <g filter="url(#or-glow)" transform="translate(200,150)"><circle r="22" fill="#ffb84a"/><circle r="14" fill="#ffe066"/></g>
  <!-- Orbs -->
  <g filter="url(#or-glow)">
    <circle cx="318" cy="150" r="10" fill="#4ff0dc"/>
    <circle cx="110" cy="220" r="12" fill="#ff8fa8"/>
    <circle cx="160" cy="50" r="8" fill="#ffe066"/>
    <circle cx="290" cy="230" r="9" fill="#a77bff"/>
  </g>
  <!-- Blockers -->
  <g transform="translate(260,80) rotate(45)"><rect x="-20" y="-3" width="40" height="6" fill="#6a6a8a"/></g>
  <g transform="translate(140,230) rotate(-30)"><rect x="-18" y="-3" width="36" height="6" fill="#6a6a8a"/></g>
  <!-- Trail -->
  <g opacity="0.5" fill="#4ff0dc"><circle cx="300" cy="145" r="3"/><circle cx="285" cy="140" r="2.5"/><circle cx="270" cy="138" r="2"/></g>
  <g font-family="monospace" fill="#4ff0dc" font-weight="bold"><text x="20" y="28" font-size="11">ORBS</text><text x="20" y="50" font-size="22">7/12</text></g>
  <g font-family="monospace" fill="#ffe066" text-anchor="end" font-weight="bold"><text x="380" y="28" font-size="11">LEVEL</text><text x="380" y="50" font-size="22">14</text></g>
</svg>
