<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="vg-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1d1f5a"/>
      <stop offset="100%" stop-color="#0a0c20"/>
    </radialGradient>
    <linearGradient id="vg-mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5f8f"/>
      <stop offset="100%" stop-color="#8c1f4d"/>
    </linearGradient>
    <linearGradient id="vg-wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#56a8ff"/>
      <stop offset="50%" stop-color="#8f7cff"/>
      <stop offset="100%" stop-color="#ff5f8f"/>
    </linearGradient>
    <filter id="vg-glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="vg-sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#vg-bg)"/>
  <!-- Pulse rings -->
  <g transform="translate(200,150)" fill="none" stroke="#ff5f8f">
    <circle r="80" opacity="0.12"/>
    <circle r="110" opacity="0.08"/>
    <circle r="140" opacity="0.05"/>
  </g>
  <!-- Waveform -->
  <g stroke="url(#vg-wave)" stroke-width="3" stroke-linecap="round" filter="url(#vg-glow)" fill="none">
    <line x1="30" y1="150" x2="30" y2="150"/>
    <line x1="46" y1="140" x2="46" y2="160"/>
    <line x1="62" y1="125" x2="62" y2="175"/>
    <line x1="78" y1="110" x2="78" y2="190"/>
    <line x1="94" y1="95" x2="94" y2="205"/>
    <line x1="110" y1="115" x2="110" y2="185"/>
    <line x1="290" y1="120" x2="290" y2="180"/>
    <line x1="306" y1="95" x2="306" y2="205"/>
    <line x1="322" y1="110" x2="322" y2="190"/>
    <line x1="338" y1="130" x2="338" y2="170"/>
    <line x1="354" y1="140" x2="354" y2="160"/>
    <line x1="370" y1="148" x2="370" y2="152"/>
  </g>
  <!-- Mic -->
  <g filter="url(#vg-glow)" transform="translate(200,150)">
    <circle r="68" fill="#1a1d40" stroke="#ff5f8f" stroke-width="2" opacity="0.8"/>
    <g filter="url(#vg-sh)">
      <rect x="-20" y="-40" width="40" height="60" rx="20" fill="url(#vg-mic)"/>
      <path d="M-32,-6 Q-32,26 0,26 Q32,26 32,-6" fill="none" stroke="url(#vg-mic)" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="26" x2="0" y2="40" stroke="url(#vg-mic)" stroke-width="4" stroke-linecap="round"/>
      <line x1="-14" y1="40" x2="14" y2="40" stroke="url(#vg-mic)" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>
  <!-- Speech bubble with guess -->
  <g filter="url(#vg-sh)" transform="translate(300,70)">
    <path d="M-60,-18 L60,-18 Q72,-18 72,-6 L72,22 Q72,34 60,34 L-30,34 L-48,48 L-42,34 L-60,34 Q-72,34 -72,22 L-72,-6 Q-72,-18 -60,-18 Z" fill="#fff"/>
    <text x="0" y="16" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#1a1d40">"forty-two"</text>
  </g>
  <!-- Answer badge -->
  <g filter="url(#vg-sh)" transform="translate(85,235)">
    <rect x="-48" y="-20" width="96" height="40" rx="20" fill="#35d39a"/>
    <text x="0" y="7" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#06190f">42 ✓</text>
  </g>
  <g font-family="monospace" fill="#fff" opacity="0.9">
    <text x="20" y="30" font-size="11" fill="#ff5f8f" font-weight="bold">🎙 LISTENING</text>
    <text x="380" y="280" font-size="11" text-anchor="end" fill="#ffd166">TRY 3/10</text>
  </g>
</svg>
