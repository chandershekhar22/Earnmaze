    <line x1="0" y1="14" x2="280" y2="60" stroke="rgba(255,48,80,0.3)" stroke-width="2" stroke-dasharray="3 3"/>
  </g>
  <!-- bullets -->
  <rect x="199" y="220" width="3" height="12" fill="#0ff"/>
  <!-- player -->
  <g fill="#fff" transform="translate(200,260)">
    <polygon points="0,-14 -14,8 14,8"/>
    <rect x="-6" y="-2" width="12" height="8" fill="#0ff"/>
  </g>
  <text x="20" y="20" font-family="monospace" font-size="11" fill="#0ff" font-weight="bold">SCORE 8420</text>
  <text x="380" y="20" font-family="monospace" font-size="11" fill="#0ff" font-weight="bold" text-anchor="end">STAGE 03</text>
