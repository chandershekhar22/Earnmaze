    <g fill="#ff5f8f" transform="translate(80,60)"><polygon points="0,-12 -14,10 -6,4 6,4 14,10"/><rect x="-3" y="-2" width="6" height="5" fill="#fff"/></g>
    <g fill="#ff5f8f" transform="translate(140,60)"><polygon points="0,-12 -14,10 -6,4 6,4 14,10"/><rect x="-3" y="-2" width="6" height="5" fill="#fff"/></g>
    <g fill="#ff5f8f" transform="translate(200,60)"><polygon points="0,-12 -14,10 -6,4 6,4 14,10"/><rect x="-3" y="-2" width="6" height="5" fill="#fff"/></g>
    <g fill="#ff5f8f" transform="translate(260,60)"><polygon points="0,-12 -14,10 -6,4 6,4 14,10"/><rect x="-3" y="-2" width="6" height="5" fill="#fff"/></g>
    <g fill="#ff5f8f" transform="translate(320,60)"><polygon points="0,-12 -14,10 -6,4 6,4 14,10"/><rect x="-3" y="-2" width="6" height="5" fill="#fff"/></g>
    <g fill="#ffd166" transform="translate(80,100)"><polygon points="0,-12 -14,10 -6,4 6,4 14,10"/><rect x="-3" y="-2" width="6" height="5" fill="#fff"/></g>
    <g fill="#ffd166" transform="translate(140,100)"><polygon points="0,-12 -14,10 -6,4 6,4 14,10"/><rect x="-3" y="-2" width="6" height="5" fill="#fff"/></g>
    <g fill="#ffd166" transform="translate(200,100)"><polygon points="0,-12 -14,10 -6,4 6,4 14,10"/><rect x="-3" y="-2" width="6" height="5" fill="#fff"/></g>
    <g fill="#ffd166" transform="translate(260,100)"><polygon points="0,-12 -14,10 -6,4 6,4 14,10"/><rect x="-3" y="-2" width="6" height="5" fill="#fff"/></g>
    <g fill="#56a8ff" transform="translate(110,140)"><polygon points="0,-12 -14,10 -6,4 6,4 14,10"/></g>
    <g fill="#56a8ff" transform="translate(170,140)"><polygon points="0,-12 -14,10 -6,4 6,4 14,10"/></g>
    <g fill="#56a8ff" transform="translate(230,140)"><polygon points="0,-12 -14,10 -6,4 6,4 14,10"/></g>
  </g>
  <!-- diving enemy -->
  <g fill="#ff3050" transform="translate(280,200) rotate(160)">
