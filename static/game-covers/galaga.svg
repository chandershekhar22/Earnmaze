<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#000"/>
  <g fill="rgba(255,255,255,0.3)">
    <rect x="30" y="30" width="1" height="1"/><rect x="80" y="100" width="1" height="1"/><rect x="150" y="50" width="1" height="1"/>
    <rect x="220" y="80" width="1" height="1"/><rect x="290" y="40" width="1" height="1"/><rect x="350" y="120" width="1" height="1"/>
    <rect x="60" y="200" width="1" height="1"/><rect x="180" y="180" width="1" height="1"/><rect x="320" y="220" width="1" height="1"/>
    <rect x="100" y="280" width="1" height="1"/><rect x="250" y="240" width="1" height="1"/>
  </g>
  <!-- Formation -->
