<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="ng-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2766"/>
      <stop offset="100%" stop-color="#0a0e27"/>
    </linearGradient>
    <linearGradient id="ng-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3368"/>
      <stop offset="100%" stop-color="#151a40"/>
    </linearGradient>
    <linearGradient id="ng-hi" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff8fa8"/><stop offset="100%" stop-color="#c02f52"/></linearGradient>
    <linearGradient id="ng-lo" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#56a8ff"/><stop offset="100%" stop-color="#2b6bc4"/></linearGradient>
    <linearGradient id="ng-ok" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4ff0b5"/><stop offset="100%" stop-color="#12875d"/></linearGradient>
    <filter id="ng-sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.35"/></filter>
    <filter id="ng-glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#ng-bg)"/>
  <g opacity="0.08" font-family="monospace" fill="#8f7cff" font-size="16">
    <text x="30" y="40">42</text><text x="320" y="60">7</text><text x="60" y="260">81</text><text x="340" y="270">99</text>
    <text x="200" y="30">13</text><text x="20" y="150">55</text><text x="370" y="170">27</text>
  </g>
  <g filter="url(#ng-glow)" transform="translate(200,120)" text-anchor="middle">
    <text font-family="'Segoe UI',Arial" font-size="90" font-weight="900" fill="#fff">?</text>
  </g>
  <text x="200" y="180" font-family="monospace" font-size="14" fill="#9aa3bd" text-anchor="middle" opacity="0.9">GUESS 1 – 100</text>
  <g filter="url(#ng-sh)">
    <g transform="translate(55,220)">
      <rect width="80" height="44" rx="8" fill="url(#ng-lo)"/>
      <text x="40" y="29" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">37 ↑</text>
      <text x="40" y="-6" text-anchor="middle" font-family="monospace" font-size="9" fill="#9aa3bd">TRY 1</text>
    </g>
    <g transform="translate(160,220)">
      <rect width="80" height="44" rx="8" fill="url(#ng-hi)"/>
      <text x="40" y="29" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">78 ↓</text>
      <text x="40" y="-6" text-anchor="middle" font-family="monospace" font-size="9" fill="#9aa3bd">TRY 2</text>
    </g>
    <g transform="translate(265,220)">
      <rect width="80" height="44" rx="8" fill="url(#ng-lo)"/>
      <text x="40" y="29" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fff">52 ↑</text>
      <text x="40" y="-6" text-anchor="middle" font-family="monospace" font-size="9" fill="#9aa3bd">TRY 3</text>
    </g>
  </g>
  <g font-family="monospace" fill="#4ff0b5" opacity="0.8">
    <text x="20" y="30" font-size="11" font-weight="bold">⌨ INPUT</text>
  </g>
  <g font-family="monospace" fill="#ffd166" opacity="0.8" text-anchor="end">
    <text x="380" y="30" font-size="11" font-weight="bold">⏱ 10 TRIES</text>
  </g>
</svg>
