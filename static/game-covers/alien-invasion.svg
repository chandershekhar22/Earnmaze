    <g transform="translate(320,70)" fill="#6eff6e"><rect x="-10" y="-8" width="20" height="14"/><rect x="-14" y="-2" width="28" height="8"/><rect x="-12" y="6" width="6" height="4"/><rect x="6" y="6" width="6" height="4"/><rect x="-6" y="-12" width="4" height="4"/><rect x="2" y="-12" width="4" height="4"/></g>
  </g>
