<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a3a1a"/>
  <!-- grass pattern -->
  <g fill="rgba(0,0,0,0.04)">
    <rect x="0" y="0" width="50" height="50"/><rect x="100" y="0" width="50" height="50"/><rect x="200" y="0" width="50" height="50"/><rect x="300" y="0" width="50" height="50"/>
    <rect x="50" y="50" width="50" height="50"/><rect x="150" y="50" width="50" height="50"/><rect x="250" y="50" width="50" height="50"/><rect x="350" y="50" width="50" height="50"/>
    <rect x="0" y="100" width="50" height="50"/><rect x="100" y="100" width="50" height="50"/><rect x="200" y="100" width="50" height="50"/><rect x="300" y="100" width="50" height="50"/>
    <rect x="50" y="150" width="50" height="50"/><rect x="150" y="150" width="50" height="50"/><rect x="250" y="150" width="50" height="50"/><rect x="350" y="150" width="50" height="50"/>
    <rect x="0" y="200" width="50" height="50"/><rect x="100" y="200" width="50" height="50"/><rect x="200" y="200" width="50" height="50"/><rect x="300" y="200" width="50" height="50"/>
  </g>
  <!-- path -->
  <path d="M 0 80 L 120 80 L 120 180 L 240 180 L 240 60 L 380 60" stroke="#8b6242" stroke-width="32" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 0 80 L 120 80 L 120 180 L 240 180 L 240 60 L 380 60" stroke="#5a3a18" stroke-width="22" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- start/end -->
  <circle cx="0" cy="80" r="14" fill="#ff3050"/>
  <circle cx="380" cy="60" r="14" fill="#56a8ff"/>
  <!-- towers (with range) -->
  <g>
    <circle cx="60" cy="140" r="60" fill="rgba(86,168,255,0.08)"/>
    <circle cx="60" cy="140" r="14" fill="#56a8ff" stroke="#000" stroke-width="2"/>
  </g>
  <g>
    <circle cx="180" cy="120" r="55" fill="rgba(255,209,102,0.08)"/>
    <circle cx="180" cy="120" r="14" fill="#ffd166" stroke="#000" stroke-width="2"/>
  </g>
  <g>
    <circle cx="300" cy="120" r="80" fill="rgba(255,48,80,0.08)"/>
    <circle cx="300" cy="120" r="14" fill="#ff3050" stroke="#000" stroke-width="2"/>
  </g>
  <!-- enemies on path -->
  <g>
    <circle cx="40" cy="80" r="9" fill="#ff3050"/>
    <rect x="25" y="68" width="30" height="3" fill="#000" opacity="0.5"/>
    <rect x="25" y="68" width="20" height="3" fill="#35d39a"/>
  </g>
  <g>
    <circle cx="120" cy="140" r="9" fill="#ff3050"/>
    <rect x="105" y="128" width="30" height="3" fill="#000" opacity="0.5"/>
    <rect x="105" y="128" width="15" height="3" fill="#35d39a"/>
  </g>
  <g>
    <circle cx="200" cy="180" r="9" fill="#ff3050"/>
  </g>
  <!-- bullet -->
  <circle cx="100" cy="140" r="3" fill="#56a8ff"/>
  <circle cx="160" cy="120" r="3" fill="#ffd166"/>
  <text x="20" y="280" font-family="monospace" font-weight="bold" font-size="11" fill="#ffd166">WAVE 5 · ❤ 18 · 🪙 240</text>
</svg>
