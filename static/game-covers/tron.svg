<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="tr-bg" cx="0.5" cy="0.5"><stop offset="0%" stop-color="#001020"/><stop offset="100%" stop-color="#000"/></radialGradient>
    <filter id="tr-glow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#tr-bg)"/>
  <g stroke="rgba(0,255,255,0.1)" stroke-width="0.5">
    <g><line x1="50" y1="0" x2="50" y2="300"/><line x1="100" y1="0" x2="100" y2="300"/><line x1="150" y1="0" x2="150" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/><line x1="250" y1="0" x2="250" y2="300"/><line x1="300" y1="0" x2="300" y2="300"/><line x1="350" y1="0" x2="350" y2="300"/></g>
    <g><line x1="0" y1="50" x2="400" y2="50"/><line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/><line x1="0" y1="250" x2="400" y2="250"/></g>
  </g>
  <!-- cyan trail -->
  <g filter="url(#tr-glow)" opacity="0.7"><path d="M 30 250 L 30 100 L 130 100 L 130 200 L 200 200" stroke="#0ff" stroke-width="6" fill="none"/></g>
  <path d="M 30 250 L 30 100 L 130 100 L 130 200 L 200 200" stroke="#0ff" stroke-width="3" fill="none"/>
  <!-- red trail -->
  <g filter="url(#tr-glow)" opacity="0.7"><path d="M 370 50 L 370 200 L 270 200 L 270 100 L 200 100" stroke="#ff3050" stroke-width="6" fill="none"/></g>
  <path d="M 370 50 L 370 200 L 270 200 L 270 100 L 200 100" stroke="#ff3050" stroke-width="3" fill="none"/>
  <!-- bikes -->
  <rect x="195" y="195" width="10" height="10" fill="#fff" filter="url(#tr-glow)"/>
  <rect x="195" y="95" width="10" height="10" fill="#fff" filter="url(#tr-glow)"/>
  <text x="20" y="20" font-family="monospace" font-size="10" fill="#0ff" font-weight="bold" filter="url(#tr-glow)">YOU</text>
  <text x="380" y="20" font-family="monospace" font-size="10" fill="#ff3050" text-anchor="end" font-weight="bold" filter="url(#tr-glow)">CPU</text>
</svg>
