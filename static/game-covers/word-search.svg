<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#06081a"/>
  <text x="200" y="32" font-family="system-ui" font-weight="800" font-size="20" fill="#56a8ff" text-anchor="middle" letter-spacing="4">WORD SEARCH</text>
  <g font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">
    <g transform="translate(60,60)">
      <!-- 9x8 grid -->
      <g fill="#cfd8e8">
        <text x="0" y="0">P</text><text x="22" y="0">Y</text><text x="44" y="0">T</text><text x="66" y="0">H</text><text x="88" y="0">O</text><text x="110" y="0">N</text><text x="132" y="0">L</text><text x="154" y="0">K</text><text x="176" y="0">A</text>
        <text x="0" y="22">A</text><text x="22" y="22">J</text><text x="44" y="22">A</text><text x="66" y="22">V</text><text x="88" y="22">A</text><text x="110" y="22">M</text><text x="132" y="22">P</text><text x="154" y="22">B</text><text x="176" y="22">N</text>
        <text x="0" y="44">R</text><text x="22" y="44">U</text><text x="44" y="44">B</text><text x="66" y="44">Y</text><text x="88" y="44">D</text><text x="110" y="44">F</text><text x="132" y="44">G</text><text x="154" y="44">U</text><text x="176" y="44">P</text>
        <text x="0" y="66">G</text><text x="22" y="66">O</text><text x="44" y="66">L</text><text x="66" y="66">A</text><text x="88" y="66">T</text><text x="110" y="66">H</text><text x="132" y="66">N</text><text x="154" y="66">S</text><text x="176" y="66">Q</text>
        <text x="0" y="88">R</text><text x="22" y="88">U</text><text x="44" y="88">S</text><text x="66" y="88">T</text><text x="88" y="88">D</text><text x="110" y="88">L</text><text x="132" y="88">M</text><text x="154" y="88">O</text><text x="176" y="88">F</text>
        <text x="0" y="110">P</text><text x="22" y="110">E</text><text x="44" y="110">R</text><text x="66" y="110">L</text><text x="88" y="110">B</text><text x="110" y="110">N</text><text x="132" y="110">F</text><text x="154" y="110">W</text><text x="176" y="110">G</text>
        <text x="0" y="132">S</text><text x="22" y="132">W</text><text x="44" y="132">I</text><text x="66" y="132">F</text><text x="88" y="132">T</text><text x="110" y="132">A</text><text x="132" y="132">B</text><text x="154" y="132">C</text><text x="176" y="132">D</text>
      </g>
      <!-- found highlights -->
      <g opacity="0.4" fill="#35d39a"><rect x="-10" y="-12" width="125" height="20" rx="10"/></g>
      <g opacity="0.4" fill="#ffd166"><rect x="10" y="10" width="84" height="20" rx="10"/></g>
      <g opacity="0.4" fill="#ff5f8f"><rect x="-10" y="32" width="84" height="20" rx="10"/></g>
      <g opacity="0.4" fill="#56a8ff"><rect x="-10" y="120" width="105" height="20" rx="10"/></g>
    </g>
  </g>
  <g font-family="monospace" font-size="11" font-weight="bold">
    <text x="280" y="80" fill="#35d39a">✓ PYTHON</text>
    <text x="280" y="100" fill="#ffd166">✓ JAVA</text>
    <text x="280" y="120" fill="#ff5f8f">✓ RUBY</text>
    <text x="280" y="140" fill="#56a8ff">✓ SWIFT</text>
    <text x="280" y="160" fill="#888">○ RUST</text>
    <text x="280" y="180" fill="#888">○ KOTLIN</text>
    <text x="280" y="200" fill="#888">○ GO</text>
  </g>
</svg>
