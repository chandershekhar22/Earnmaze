<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <filter id="cm-sh"><feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.5"/></filter>
  </defs>
  <rect width="400" height="300" fill="#0a0418"/>
  <text x="200" y="36" font-family="system-ui" font-weight="800" font-size="20" fill="#ffd166" text-anchor="middle" letter-spacing="6">COLOR MIX</text>
  <!-- target & yours -->
  <g filter="url(#cm-sh)">
    <rect x="80" y="60" width="80" height="80" rx="14" fill="#e84a72"/>
    <text x="120" y="155" font-family="monospace" font-size="9" fill="#888" text-anchor="middle">TARGET</text>
    <text x="200" y="108" font-family="system-ui" font-size="30" fill="#666" text-anchor="middle">→</text>
    <rect x="240" y="60" width="80" height="80" rx="14" fill="#d54860"/>
    <text x="280" y="155" font-family="monospace" font-size="9" fill="#888" text-anchor="middle">YOURS</text>
  </g>
  <rect x="160" y="166" width="80" height="20" rx="10" fill="#1ea050"/>
  <text x="200" y="180" font-family="monospace" font-size="11" fill="#000" text-anchor="middle" font-weight="bold">DIFF: 4%</text>
  <!-- sliders -->
  <g font-family="monospace" font-weight="bold" font-size="11">
    <text x="50" y="220" fill="#ff5050">R</text>
    <rect x="65" y="213" width="240" height="8" rx="4" fill="url(#cm-r)"/>
    <linearGradient id="cm-r"><stop offset="0%" stop-color="#000"/><stop offset="100%" stop-color="#f33"/></linearGradient>
    <circle cx="265" cy="217" r="8" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="320" y="220" fill="#fff">232</text>

    <text x="50" y="245" fill="#50ff50">G</text>
    <rect x="65" y="238" width="240" height="8" rx="4" fill="url(#cm-g)"/>
    <linearGradient id="cm-g"><stop offset="0%" stop-color="#000"/><stop offset="100%" stop-color="#3f3"/></linearGradient>
    <circle cx="140" cy="242" r="8" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="320" y="245" fill="#fff">74</text>

    <text x="50" y="270" fill="#5080ff">B</text>
    <rect x="65" y="263" width="240" height="8" rx="4" fill="url(#cm-b)"/>
    <linearGradient id="cm-b"><stop offset="0%" stop-color="#000"/><stop offset="100%" stop-color="#36f"/></linearGradient>
    <circle cx="170" cy="267" r="8" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="320" y="270" fill="#fff">114</text>
  </g>
</svg>
