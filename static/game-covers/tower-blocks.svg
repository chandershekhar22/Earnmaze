<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tb-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2966"/>
      <stop offset="100%" stop-color="#4a6dbf"/>
    </linearGradient>
    <linearGradient id="tb-b1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff5f8f"/><stop offset="100%" stop-color="#c33168"/></linearGradient>
    <linearGradient id="tb-b2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff8a3d"/><stop offset="100%" stop-color="#c96020"/></linearGradient>
    <linearGradient id="tb-b3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffd166"/><stop offset="100%" stop-color="#c99d33"/></linearGradient>
    <linearGradient id="tb-b4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#35d39a"/><stop offset="100%" stop-color="#1b9366"/></linearGradient>
    <linearGradient id="tb-b5" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#56a8ff"/><stop offset="100%" stop-color="#2b72c4"/></linearGradient>
    <linearGradient id="tb-b6" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8f7cff"/><stop offset="100%" stop-color="#5a49c4"/></linearGradient>
    <filter id="tb-sh"><feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.35"/></filter>
    <filter id="tb-glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#tb-sky)"/>
  <g fill="#fff" opacity="0.6">
    <circle cx="60" cy="40" r="1.5"/><circle cx="340" cy="60" r="1"/>
    <circle cx="90" cy="80" r="1"/><circle cx="350" cy="30" r="1.3"/>
    <circle cx="40" cy="130" r="1"/><circle cx="370" cy="160" r="1.2"/>
  </g>
  <g transform="translate(200,280)">
    <g filter="url(#tb-sh)"><rect x="-80" y="-20" width="160" height="20" rx="3" fill="url(#tb-b1)"/><rect x="-80" y="-20" width="160" height="5" fill="#fff" opacity="0.2" rx="3"/></g>
    <g filter="url(#tb-sh)"><rect x="-76" y="-40" width="152" height="20" rx="3" fill="url(#tb-b2)"/><rect x="-76" y="-40" width="152" height="5" fill="#fff" opacity="0.2" rx="3"/></g>
    <g filter="url(#tb-sh)"><rect x="-70" y="-60" width="140" height="20" rx="3" fill="url(#tb-b3)"/><rect x="-70" y="-60" width="140" height="5" fill="#fff" opacity="0.2" rx="3"/></g>
    <g filter="url(#tb-sh)"><rect x="-60" y="-80" width="120" height="20" rx="3" fill="url(#tb-b4)"/><rect x="-60" y="-80" width="120" height="5" fill="#fff" opacity="0.2" rx="3"/></g>
    <g filter="url(#tb-sh)"><rect x="-50" y="-100" width="98" height="20" rx="3" fill="url(#tb-b5)"/><rect x="-50" y="-100" width="98" height="5" fill="#fff" opacity="0.2" rx="3"/></g>
    <g filter="url(#tb-sh)"><rect x="-35" y="-120" width="80" height="20" rx="3" fill="url(#tb-b6)"/><rect x="-35" y="-120" width="80" height="5" fill="#fff" opacity="0.2" rx="3"/></g>
    <g filter="url(#tb-sh)"><rect x="-22" y="-140" width="62" height="20" rx="3" fill="url(#tb-b1)"/></g>
    <g filter="url(#tb-glow)"><rect x="20" y="-170" width="56" height="20" rx="3" fill="url(#tb-b2)"/><rect x="20" y="-170" width="56" height="5" fill="#fff" opacity="0.35" rx="3"/></g>
  </g>
  <g transform="translate(35,40)" font-family="monospace" fill="#fff" opacity="0.85">
    <text x="0" y="0" font-size="10">LEVEL</text>
    <text x="0" y="24" font-size="22" font-weight="bold">07</text>
  </g>
  <g transform="translate(365,40)" font-family="monospace" fill="#ffd166" opacity="0.85" text-anchor="end">
    <text x="0" y="0" font-size="10">HIGH</text>
    <text x="0" y="24" font-size="22" font-weight="bold">12</text>
  </g>
</svg>
