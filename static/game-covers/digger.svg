<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="dg-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a0a04"/><stop offset="100%" stop-color="#3a1a0a"/></linearGradient>
    <filter id="dg-glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#dg-bg)"/>
  <!-- Dirt grid -->
  <g fill="#5a2a0a" stroke="#2a1005" stroke-width="1">
    <rect x="40" y="40" width="40" height="40"/><rect x="80" y="40" width="40" height="40"/><rect x="120" y="40" width="40" height="40"/><rect x="160" y="40" width="40" height="40"/><rect x="240" y="40" width="40" height="40"/><rect x="280" y="40" width="40" height="40"/><rect x="320" y="40" width="40" height="40"/>
    <rect x="40" y="80" width="40" height="40"/><rect x="80" y="80" width="40" height="40"/><rect x="200" y="80" width="40" height="40"/><rect x="280" y="80" width="40" height="40"/><rect x="320" y="80" width="40" height="40"/>
    <rect x="40" y="120" width="40" height="40"/><rect x="160" y="120" width="40" height="40"/><rect x="200" y="120" width="40" height="40"/><rect x="240" y="120" width="40" height="40"/><rect x="320" y="120" width="40" height="40"/>
    <rect x="40" y="160" width="40" height="40"/><rect x="80" y="160" width="40" height="40"/><rect x="120" y="160" width="40" height="40"/><rect x="200" y="160" width="40" height="40"/><rect x="240" y="160" width="40" height="40"/><rect x="280" y="160" width="40" height="40"/><rect x="320" y="160" width="40" height="40"/>
    <rect x="80" y="200" width="40" height="40"/><rect x="120" y="200" width="40" height="40"/><rect x="200" y="200" width="40" height="40"/><rect x="240" y="200" width="40" height="40"/><rect x="320" y="200" width="40" height="40"/>
  </g>
  <!-- Gems -->
  <g filter="url(#dg-glow)"><polygon points="140,100 150,92 160,100 150,108" fill="#4ff0b5"/><polygon points="260,100 270,92 280,100 270,108" fill="#ff5f8f"/><polygon points="300,180 310,172 320,180 310,188" fill="#ffe066"/><polygon points="180,220 190,212 200,220 190,228" fill="#8f7cff"/></g>
  <!-- Bag of gold -->
  <g filter="url(#dg-glow)" transform="translate(230,140)"><ellipse rx="14" ry="10" fill="#ffd166"/><rect x="-10" y="-14" width="20" height="6" rx="2" fill="#a07010"/><text y="3" text-anchor="middle" font-family="'Segoe UI'" font-size="10" font-weight="bold" fill="#5a3a08">$</text></g>
  <!-- Digger character -->
  <g filter="url(#dg-glow)" transform="translate(90,140)">
    <rect x="-14" y="-10" width="28" height="20" rx="3" fill="#e8c234"/>
    <rect x="-10" y="-14" width="20" height="8" rx="2" fill="#e8c234"/>
    <circle cx="-5" cy="-4" r="2" fill="#000"/><circle cx="5" cy="-4" r="2" fill="#000"/>
    <rect x="-12" y="10" width="4" height="6" fill="#c08020"/><rect x="8" y="10" width="4" height="6" fill="#c08020"/>
  </g>
  <!-- Monster -->
  <g filter="url(#dg-glow)" transform="translate(300,140)"><circle r="13" fill="#8a2a8a"/><circle cx="-4" cy="-2" r="3" fill="#fff"/><circle cx="4" cy="-2" r="3" fill="#fff"/><circle cx="-4" cy="-2" r="1.5" fill="#000"/><circle cx="4" cy="-2" r="1.5" fill="#000"/><path d="M-6,5 L-4,8 L-2,5 L0,8 L2,5 L4,8 L6,5" stroke="#fff" stroke-width="1.5" fill="none"/></g>
  <g font-family="monospace" fill="#ffd166" font-weight="bold"><text x="20" y="28" font-size="11">SCORE</text><text x="20" y="50" font-size="20">14,800</text></g>
  <g font-family="monospace" fill="#4ff0b5" text-anchor="end" font-weight="bold"><text x="380" y="28" font-size="11">LIVES</text><text x="380" y="50" font-size="20">♥♥♥</text></g>
