<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a0e08"/>
  <!-- board -->
  <rect x="20" y="100" width="360" height="100" rx="50" fill="#5a3a18"/>
  <!-- 6 player pits -->
  <g>
    <circle cx="100" cy="150" r="20" fill="#2a1a08"/>
    <circle cx="140" cy="150" r="20" fill="#2a1a08"/>
    <circle cx="180" cy="150" r="20" fill="#2a1a08"/>
    <circle cx="220" cy="150" r="20" fill="#2a1a08"/>
    <circle cx="260" cy="150" r="20" fill="#2a1a08"/>
    <circle cx="300" cy="150" r="20" fill="#2a1a08"/>
  </g>
  <!-- stones -->
  <g fill="#fff">
    <circle cx="95" cy="146" r="3"/><circle cx="103" cy="146" r="3"/><circle cx="99" cy="154" r="3"/><circle cx="107" cy="154" r="3"/>
    <circle cx="135" cy="146" r="3"/><circle cx="143" cy="146" r="3"/><circle cx="139" cy="154" r="3"/><circle cx="147" cy="154" r="3"/><circle cx="131" cy="154" r="3"/>
    <circle cx="175" cy="146" r="3"/><circle cx="183" cy="146" r="3"/><circle cx="179" cy="154" r="3"/>
    <circle cx="215" cy="146" r="3"/><circle cx="223" cy="146" r="3"/><circle cx="219" cy="154" r="3"/><circle cx="227" cy="154" r="3"/>
    <circle cx="255" cy="146" r="3"/><circle cx="263" cy="146" r="3"/><circle cx="259" cy="154" r="3"/>
    <circle cx="295" cy="146" r="3"/><circle cx="303" cy="146" r="3"/><circle cx="299" cy="154" r="3"/><circle cx="307" cy="154" r="3"/><circle cx="291" cy="154" r="3"/>
  </g>
  <!-- stores (left=cpu, right=you) -->
  <ellipse cx="50" cy="150" rx="20" ry="40" fill="#1a0a04"/>
  <ellipse cx="350" cy="150" rx="20" ry="40" fill="#1a0a04"/>
  <text x="50" y="156" font-family="monospace" font-weight="800" font-size="22" fill="#ff3050" text-anchor="middle">8</text>
  <text x="350" y="156" font-family="monospace" font-weight="800" font-size="22" fill="#56a8ff" text-anchor="middle">12</text>
  <!-- header -->
  <text x="200" y="60" font-family="system-ui" font-weight="800" font-size="22" fill="#ffd166" text-anchor="middle" letter-spacing="6">MANCALA</text>
  <text x="200" y="240" font-family="monospace" font-size="11" fill="#ffd166" text-anchor="middle">YOUR TURN</text>
  <!-- stones above as preview -->
  <g fill="#fff" opacity="0.6">
    <circle cx="200" cy="245" r="3"/>
  </g>
</svg>
