<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="pr-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0a20"/><stop offset="100%" stop-color="#000"/></linearGradient>
    <filter id="pr-glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#pr-bg)"/>
  <!-- Incoming white beam -->
  <g stroke="#ffffff" stroke-width="3" filter="url(#pr-glow)"><line x1="20" y1="150" x2="170" y2="150"/></g>
  <!-- Prism (triangle) -->
  <g filter="url(#pr-glow)"><polygon points="170,90 220,210 120,210" fill="#3a4a6a" stroke="#8fb5ff" stroke-width="2" opacity="0.9"/></g>
  <!-- Rainbow beams out -->
  <g stroke-width="3" filter="url(#pr-glow)">
    <line x1="200" y1="150" x2="380" y2="80" stroke="#ff3a6a"/>
    <line x1="205" y1="150" x2="380" y2="110" stroke="#ff9a3a"/>
    <line x1="210" y1="150" x2="380" y2="140" stroke="#ffe066"/>
    <line x1="215" y1="150" x2="380" y2="170" stroke="#4ff0b5"/>
    <line x1="220" y1="150" x2="380" y2="200" stroke="#4ff0dc"/>
    <line x1="225" y1="150" x2="380" y2="230" stroke="#a77bff"/>
  </g>
  <!-- Targets on right -->
  <g>
    <circle cx="378" cy="80" r="6" fill="#ff3a6a" opacity="0.5"/>
    <circle cx="378" cy="140" r="6" fill="#ffe066"/>
    <circle cx="378" cy="200" r="6" fill="#4ff0dc" opacity="0.5"/>
  </g>
  <g font-family="monospace" fill="#8fb5ff" font-weight="bold"><text x="20" y="28" font-size="11">PRISM</text><text x="20" y="50" font-size="18">LEVEL 06</text></g>
  <g font-family="monospace" fill="#4ff0b5" text-anchor="end" font-weight="bold"><text x="380" y="28" font-size="11">HIT 1/3</text></g>
</svg>
