<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="mc-exp"><stop offset="0%" stop-color="#fff066"/><stop offset="60%" stop-color="#ff5020"/><stop offset="100%" stop-color="rgba(255,40,0,0)"/></radialGradient>
  </defs>
  <rect width="400" height="300" fill="#000"/>
  <!-- ground -->
  <rect x="0" y="260" width="400" height="40" fill="#3a2618"/>
  <!-- cities -->
  <g fill="#56a8ff">
    <rect x="60" y="240" width="8" height="20"/><rect x="72" y="232" width="10" height="28"/><rect x="86" y="246" width="8" height="14"/>
    <rect x="180" y="240" width="8" height="20"/><rect x="192" y="232" width="10" height="28"/><rect x="206" y="246" width="8" height="14"/>
    <rect x="300" y="240" width="8" height="20"/><rect x="312" y="232" width="10" height="28"/><rect x="326" y="246" width="8" height="14"/>
  </g>
  <!-- silos -->
  <g fill="#8aff8a">
    <polygon points="20,260 60,260 50,242 30,242"/>
    <polygon points="180,260 220,260 210,242 190,242"/>
    <polygon points="340,260 380,260 370,242 350,242"/>
  </g>
  <!-- enemy missiles -->
  <g stroke="#ff3050" stroke-width="2" fill="none">
    <line x1="50" y1="20" x2="100" y2="120"/>
    <line x1="200" y1="0" x2="180" y2="100"/>
    <line x1="350" y1="30" x2="280" y2="140"/>
  </g>
  <g fill="#fff">
    <circle cx="100" cy="120" r="2"/>
    <circle cx="180" cy="100" r="2"/>
    <circle cx="280" cy="140" r="2"/>
  </g>
  <!-- player missiles -->
  <g stroke="#8aff8a" stroke-width="1" fill="none">
    <line x1="40" y1="252" x2="160" y2="160"/>
    <line x1="200" y1="252" x2="220" y2="80"/>
  </g>
  <!-- explosions -->
  <circle cx="160" cy="160" r="32" fill="url(#mc-exp)"/>
  <circle cx="240" cy="180" r="20" fill="url(#mc-exp)"/>
  <circle cx="100" cy="80" r="14" fill="url(#mc-exp)"/>
  <text x="20" y="20" font-family="monospace" font-size="11" fill="#ffd166" font-weight="bold">SCORE 4280</text>
  <text x="380" y="20" font-family="monospace" font-size="11" fill="#ffd166" font-weight="bold" text-anchor="end">WAVE 04</text>
</svg>
