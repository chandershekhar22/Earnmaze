<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sf-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff7a3a"/><stop offset="100%" stop-color="#3a0a0a"/></linearGradient>
    <filter id="sf-glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sf-sh"><feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#sf-bg)"/>
  <!-- Trees (healthy) -->
  <g filter="url(#sf-sh)">
    <g transform="translate(60,200)"><rect x="-4" y="0" width="8" height="30" fill="#5a3a1a"/><polygon points="0,-30 -20,10 20,10" fill="#2a7a2a"/><polygon points="0,-45 -15,-5 15,-5" fill="#3a8a3a"/></g>
    <g transform="translate(130,210)"><rect x="-4" y="0" width="8" height="25" fill="#5a3a1a"/><polygon points="0,-25 -18,8 18,8" fill="#2a7a2a"/></g>
    <g transform="translate(330,205)"><rect x="-4" y="0" width="8" height="30" fill="#5a3a1a"/><polygon points="0,-30 -20,10 20,10" fill="#2a7a2a"/></g>
  </g>
  <!-- Trees on fire -->
  <g filter="url(#sf-sh)">
    <g transform="translate(200,200)"><rect x="-4" y="0" width="8" height="30" fill="#4a2a0a"/><polygon points="0,-30 -20,10 20,10" fill="#8a3a1a"/></g>
    <g transform="translate(260,210)"><rect x="-4" y="0" width="8" height="25" fill="#4a2a0a"/><polygon points="0,-25 -18,8 18,8" fill="#6a2a0a"/></g>
  </g>
  <!-- Fire flames -->
  <g filter="url(#sf-glow)">
    <path d="M190,180 Q185,155 200,140 Q215,155 210,180 Z" fill="#ff6a20"/>
    <path d="M195,175 Q193,158 200,148 Q207,158 205,175 Z" fill="#ffe066"/>
    <path d="M250,195 Q246,172 260,160 Q274,172 270,195 Z" fill="#ff6a20"/>
    <path d="M255,190 Q254,175 260,168 Q266,175 265,190 Z" fill="#ffe066"/>
  </g>
  <!-- Water drops (hero action) -->
  <g filter="url(#sf-glow)" fill="#4ff0ff">
    <ellipse cx="120" cy="60" rx="4" ry="8"/>
    <ellipse cx="160" cy="80" rx="3" ry="6"/>
    <ellipse cx="280" cy="70" rx="4" ry="8"/>
    <ellipse cx="310" cy="100" rx="3" ry="6"/>
    <ellipse cx="220" cy="95" rx="3" ry="6"/>
  </g>
  <!-- Ground -->
  <rect y="230" width="400" height="70" fill="#3a2010" opacity="0.7"/>
  <g font-family="monospace" fill="#fff" font-weight="bold"><text x="20" y="28" font-size="11">TREES LEFT</text><text x="20" y="50" font-size="22" fill="#5ee85e">24</text></g>
  <g font-family="monospace" fill="#fff" text-anchor="end" font-weight="bold"><text x="380" y="28" font-size="11">🔥 FIRES</text><text x="380" y="50" font-size="22" fill="#ff6a20">03</text></g>
</svg>
