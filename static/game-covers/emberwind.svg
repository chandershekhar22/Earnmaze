<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="ew-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffa540"/><stop offset="60%" stop-color="#a03a20"/><stop offset="100%" stop-color="#3a1010"/></linearGradient>
    <filter id="ew-glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ew-sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.5"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#ew-bg)"/>
  <!-- Distant hills -->
  <g fill="#2a0810" opacity="0.75"><polygon points="0,180 100,130 200,180"/><polygon points="180,180 260,120 360,180"/></g>
  <!-- Ground -->
  <rect y="220" width="400" height="80" fill="#1a0810"/>
  <!-- Trees -->
  <g filter="url(#ew-sh)">
    <g transform="translate(60,220)"><rect x="-4" y="-30" width="8" height="30" fill="#3a1808"/><circle cx="0" cy="-40" r="20" fill="#4a1a10"/></g>
    <g transform="translate(340,220)"><rect x="-4" y="-30" width="8" height="30" fill="#3a1808"/><circle cx="0" cy="-40" r="22" fill="#4a1a10"/></g>
  </g>
  <!-- Sun glow -->
  <g filter="url(#ew-glow)"><circle cx="300" cy="80" r="28" fill="#ffe066"/><circle cx="300" cy="80" r="18" fill="#fff"/></g>
  <!-- Platform -->
  <g filter="url(#ew-sh)"><rect x="160" y="180" width="90" height="14" rx="3" fill="#8a4020"/></g>
  <!-- Hero -->
  <g filter="url(#ew-sh)" transform="translate(200,175)">
    <circle cy="-28" r="10" fill="#f0d090"/>
    <rect x="-8" y="-18" width="16" height="18" fill="#2a5a8a"/>
    <rect x="-10" y="-4" width="20" height="10" fill="#6a2a10"/>
    <rect x="-6" y="0" width="4" height="6" fill="#2a1808"/>
    <rect x="2" y="0" width="4" height="6" fill="#2a1808"/>
    <rect x="-18" y="-12" width="6" height="12" fill="#2a5a8a" transform="rotate(-15)"/>
    <rect x="10" y="-14" width="14" height="4" fill="#c2c7d1"/>
  </g>
  <!-- Embers -->
  <g filter="url(#ew-glow)" fill="#ffe066"><circle cx="100" cy="130" r="2"/><circle cx="140" cy="100" r="1.5"/><circle cx="80" cy="80" r="2"/><circle cx="260" cy="110" r="1.5"/></g>
  <g font-family="monospace" fill="#fff" font-weight="bold"><text x="20" y="28" font-size="11">KEE</text><text x="20" y="50" font-size="22">♥♥♥</text></g>
  <g font-family="monospace" fill="#ffe066" text-anchor="end" font-weight="bold"><text x="380" y="28" font-size="11">EMBERS</text><text x="380" y="50" font-size="22">128</text></g>
</svg>
