<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bw-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f1a40"/><stop offset="100%" stop-color="#050918"/></linearGradient>
    <linearGradient id="bw-ball" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffe066"/><stop offset="100%" stop-color="#c9860d"/></linearGradient>
    <filter id="bw-glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bw-bg)"/>
  <!-- Walls -->
  <g filter="url(#bw-glow)">
    <rect x="50" y="80" width="6" height="80" fill="#4ff0b5"/>
    <rect x="120" y="50" width="6" height="120" fill="#ff5f8f"/>
    <rect x="200" y="90" width="6" height="70" fill="#8f7cff"/>
    <rect x="270" y="40" width="6" height="140" fill="#4ff0b5"/>
    <rect x="340" y="70" width="6" height="100" fill="#ff5f8f"/>
    <rect x="90" y="220" width="6" height="60" fill="#ff8a3d"/>
    <rect x="180" y="200" width="6" height="80" fill="#4ff0dc"/>
    <rect x="300" y="230" width="6" height="50" fill="#ffd166"/>
  </g>
  <!-- Ball trail -->
  <g opacity="0.5"><circle cx="140" cy="180" r="6" fill="#ffe066" opacity="0.2"/><circle cx="160" cy="175" r="7" fill="#ffe066" opacity="0.4"/><circle cx="180" cy="168" r="8" fill="#ffe066" opacity="0.6"/></g>
  <!-- Ball -->
  <g filter="url(#bw-glow)"><circle cx="200" cy="160" r="12" fill="url(#bw-ball)"/><circle cx="196" cy="156" r="4" fill="#fff" opacity="0.5"/></g>
  <g font-family="monospace" fill="#4ff0b5" font-weight="bold"><text x="20" y="28" font-size="11">SCORE</text><text x="20" y="50" font-size="22">1,840</text></g>
  <g font-family="monospace" fill="#ffe066" text-anchor="end" font-weight="bold"><text x="380" y="28" font-size="11">WAVE</text><text x="380" y="50" font-size="22">12</text></g>
</svg>
