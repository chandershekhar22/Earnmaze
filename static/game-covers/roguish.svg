<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="rg-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0a0a"/><stop offset="100%" stop-color="#000"/></linearGradient>
    <filter id="rg-glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#rg-bg)"/>
  <!-- Dungeon grid (ASCII-style) -->
  <g font-family="'Courier New',monospace" font-size="14" fill="#3a3a3a">
    <text x="30" y="50">#####################</text>
    <text x="30" y="68">#.........#.........#</text>
    <text x="30" y="86">#...###...#...###...#</text>
    <text x="30" y="104">#...#.....#.....#...#</text>
    <text x="30" y="122">#...#.............#..#</text>
    <text x="30" y="140">#...+...##.##...+...#</text>
    <text x="30" y="158">#.......#...#.......#</text>
    <text x="30" y="176">#...###.#...#.###...#</text>
    <text x="30" y="194">#...#.......#...#...#</text>
    <text x="30" y="212">#...#...####....#...#</text>
    <text x="30" y="230">#.......#..........#</text>
    <text x="30" y="248">#####################</text>
  </g>
  <!-- Highlighted entities -->
  <g font-family="'Courier New',monospace" font-size="14" font-weight="bold" filter="url(#rg-glow)">
    <text x="168" y="140" fill="#4ff0b5">@</text>
    <text x="86" y="104" fill="#ff5f8f">r</text>
    <text x="240" y="194" fill="#ff5f8f">D</text>
    <text x="290" y="86" fill="#ffe066">$</text>
    <text x="138" y="194" fill="#a77bff">!</text>
    <text x="230" y="230" fill="#ffe066">*</text>
  </g>
  <g font-family="monospace" fill="#4ff0b5" font-weight="bold"><text x="20" y="28" font-size="11">HP</text><text x="20" y="290" font-size="14" fill="#ff5f8f">HP: 18/25</text></g>
  <g font-family="monospace" fill="#ffe066" text-anchor="end" font-weight="bold"><text x="380" y="28" font-size="11">DEPTH</text><text x="380" y="290" font-size="14">D:07  XP: 2140</text></g>
</svg>
