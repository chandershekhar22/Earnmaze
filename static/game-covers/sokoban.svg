<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sk-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1410"/><stop offset="100%" stop-color="#0a0805"/></linearGradient>
    <linearGradient id="sk-box" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a87a4a"/><stop offset="100%" stop-color="#5a3a20"/></linearGradient>
    <linearGradient id="sk-wall" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8b7045"/><stop offset="100%" stop-color="#3a2818"/></linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sk-bg)"/>
  <g>
    <!-- floor grid 8x6 -->
    <g fill="#2a2218" stroke="#1a1208" stroke-width="0.5">
      <rect x="40" y="40" width="320" height="220"/>
      <g stroke="#3a2a18" opacity="0.5">
        <line x1="80" y1="40" x2="80" y2="260"/><line x1="120" y1="40" x2="120" y2="260"/><line x1="160" y1="40" x2="160" y2="260"/>
        <line x1="200" y1="40" x2="200" y2="260"/><line x1="240" y1="40" x2="240" y2="260"/><line x1="280" y1="40" x2="280" y2="260"/><line x1="320" y1="40" x2="320" y2="260"/>
        <line x1="40" y1="80" x2="360" y2="80"/><line x1="40" y1="120" x2="360" y2="120"/><line x1="40" y1="160" x2="360" y2="160"/><line x1="40" y1="200" x2="360" y2="200"/><line x1="40" y1="240" x2="360" y2="240"/>
      </g>
    </g>
    <!-- walls -->
    <g>
      <rect x="40" y="40" width="40" height="40" fill="url(#sk-wall)"/>
      <rect x="80" y="40" width="40" height="40" fill="url(#sk-wall)"/>
      <rect x="320" y="40" width="40" height="40" fill="url(#sk-wall)"/>
      <rect x="40" y="220" width="40" height="40" fill="url(#sk-wall)"/>
      <rect x="320" y="220" width="40" height="40" fill="url(#sk-wall)"/>
      <rect x="280" y="220" width="40" height="40" fill="url(#sk-wall)"/>
    </g>
    <!-- targets -->
    <g fill="#ffa540" font-size="40" font-weight="bold" text-anchor="middle" font-family="monospace">
      <text x="180" y="100">·</text>
      <text x="220" y="100">·</text>
      <text x="180" y="220">·</text>
    </g>
    <!-- boxes -->
    <g>
      <rect x="148" y="128" width="32" height="32" rx="3" fill="url(#sk-box)" stroke="#3a1f0a" stroke-width="2"/>
      <rect x="152" y="132" width="24" height="24" fill="none" stroke="#c08a5a" stroke-width="2"/>
      <rect x="208" y="128" width="32" height="32" rx="3" fill="url(#sk-box)" stroke="#3a1f0a" stroke-width="2"/>
      <rect x="212" y="132" width="24" height="24" fill="none" stroke="#c08a5a" stroke-width="2"/>
      <!-- box on target (green) -->
      <rect x="168" y="208" width="32" height="32" rx="3" fill="#5fc468" stroke="#2a8030" stroke-width="2"/>
      <rect x="172" y="212" width="24" height="24" fill="none" stroke="#8fea90" stroke-width="2"/>
    </g>
    <!-- player -->
    <g transform="translate(264,144)">
      <circle r="14" fill="#ffe066"/>
      <circle r="10" fill="#ff8a3d"/>
      <text y="3" font-size="18" font-weight="bold" text-anchor="middle" fill="#3a1010">☻</text>
    </g>
  </g>
  <text x="200" y="288" font-family="monospace" font-weight="bold" font-size="11" fill="#ffe066" text-anchor="middle" letter-spacing="3">SOKOBAN · L 12</text>
</svg>
