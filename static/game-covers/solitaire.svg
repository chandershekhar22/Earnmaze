<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sol-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="sol-back" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="50%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <filter id="sol-shadow">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.35"/>
    </filter>
    <pattern id="sol-pattern" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#0d47a1"/>
      <circle cx="5" cy="5" r="2" fill="#1565c0" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="transparent"/>
  <!-- Card back (far left, tilted) -->
  <g transform="translate(80, 150) rotate(-25)" filter="url(#sol-shadow)">
    <rect x="-45" y="-65" width="90" height="130" rx="8" fill="url(#sol-back)" stroke="#0a3a7a" stroke-width="1"/>
    <rect x="-38" y="-58" width="76" height="116" rx="5" fill="url(#sol-pattern)" stroke="#fff" stroke-width="0.5" opacity="0.8"/>
    <rect x="-30" y="-50" width="60" height="100" rx="3" stroke="#4fc3f7" stroke-width="1" fill="none"/>
  </g>
  <!-- Ace of Spades -->
  <g transform="translate(160, 140) rotate(-12)" filter="url(#sol-shadow)">
    <rect x="-45" y="-65" width="90" height="130" rx="8" fill="url(#sol-card)" stroke="#ccc" stroke-width="1"/>
    <text x="-32" y="-42" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#222">A</text>
    <!-- Spade symbol top-left -->
    <path d="M-32,-30 L-27,-22 Q-32,-18 -37,-22 Q-35,-17 -32,-16 Q-29,-17 -27,-22 Q-32,-18 -32,-30Z" fill="#222" transform="scale(0.8)"/>
    <!-- Large center spade -->
    <path d="M0,5 C0,-15 -20,-20 -20,-35 C-20,-48 0,-55 0,-55 C0,-55 20,-48 20,-35 C20,-20 0,-15 0,5Z" fill="#222"/>
    <path d="M0,5 L-6,18 L6,18 Z" fill="#222"/>
    <text x="28" y="55" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#222" transform="rotate(180 28 50)">A</text>
  </g>
  <!-- King of Hearts -->
  <g transform="translate(240, 130) rotate(5)" filter="url(#sol-shadow)">
    <rect x="-45" y="-65" width="90" height="130" rx="8" fill="url(#sol-card)" stroke="#ccc" stroke-width="1"/>
    <text x="-32" y="-42" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#c62828">K</text>
    <!-- Heart symbol top-left -->
    <path d="M-30,-36 C-30,-40 -25,-42 -25,-38 C-25,-42 -20,-40 -20,-36 C-20,-32 -25,-28 -25,-28 C-25,-28 -30,-32 -30,-36Z" fill="#c62828"/>
    <!-- King face simplified -->
    <rect x="-15" y="-40" width="30" height="60" rx="3" fill="#fff3e0" stroke="#e65100" stroke-width="0.5"/>
    <!-- Crown -->
    <path d="M-12,-42 L-12,-50 L-6,-45 L0,-52 L6,-45 L12,-50 L12,-42Z" fill="#ffd600" stroke="#e65100" stroke-width="0.5"/>
    <circle cx="-6" cy="-47" r="2" fill="#c62828"/>
    <circle cx="6" cy="-47" r="2" fill="#c62828"/>
    <circle cx="0" cy="-50" r="2" fill="#c62828"/>
    <!-- Face -->
    <circle cx="-5" cy="-30" r="2" fill="#333"/>
    <circle cx="5" cy="-30" r="2" fill="#333"/>
    <path d="M-4,-24 Q0,-20 4,-24" fill="none" stroke="#333" stroke-width="1"/>
    <!-- Robe -->
    <rect x="-12" y="-18" width="24" height="30" fill="#c62828" rx="2"/>
    <rect x="-12" y="-18" width="24" height="8" fill="#ffd600" opacity="0.5"/>
    <text x="28" y="55" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#c62828" transform="rotate(180 28 50)">K</text>
  </g>
  <!-- Queen of Diamonds (partially visible) -->
  <g transform="translate(310, 145) rotate(18)" filter="url(#sol-shadow)">
    <rect x="-45" y="-65" width="90" height="130" rx="8" fill="url(#sol-card)" stroke="#ccc" stroke-width="1"/>
    <text x="-32" y="-42" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#c62828">Q</text>
    <!-- Diamond symbol -->
    <polygon points="-25,-38 -22,-42 -19,-38 -22,-34" fill="#c62828"/>
    <!-- Simplified queen -->
    <circle cx="0" cy="-25" r="12" fill="#fff3e0" stroke="#e65100" stroke-width="0.5"/>
    <!-- Tiara -->
    <path d="M-10,-34 L-8,-40 L-4,-36 L0,-42 L4,-36 L8,-40 L10,-34" fill="#ffd600" stroke="#e65100" stroke-width="0.5"/>
    <circle cx="-5" cy="-27" r="1.5" fill="#333"/>
    <circle cx="5" cy="-27" r="1.5" fill="#333"/>
    <path d="M-3,-21 Q0,-18 3,-21" fill="none" stroke="#c62828" stroke-width="1"/>
    <rect x="-10" y="-12" width="20" height="28" fill="#c62828" rx="2"/>
  </g>
  <!-- Subtle green felt texture -->
  <rect x="0" y="0" width="400" height="300" fill="#1b5e20" opacity="0.05" rx="10"/>
</svg>