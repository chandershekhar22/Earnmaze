<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a0a20"/>
  <!-- 5 tilted girders (red beams) -->
  <g>
    <g><line x1="0" y1="50" x2="400" y2="60" stroke="#ff3050" stroke-width="14"/><line x1="0" y1="50" x2="400" y2="60" stroke="#a01030" stroke-width="10"/></g>
    <g><line x1="0" y1="115" x2="400" y2="105" stroke="#ff3050" stroke-width="14"/><line x1="0" y1="115" x2="400" y2="105" stroke="#a01030" stroke-width="10"/></g>
    <g><line x1="0" y1="170" x2="400" y2="180" stroke="#ff3050" stroke-width="14"/><line x1="0" y1="170" x2="400" y2="180" stroke="#a01030" stroke-width="10"/></g>
    <g><line x1="0" y1="240" x2="400" y2="230" stroke="#ff3050" stroke-width="14"/><line x1="0" y1="240" x2="400" y2="230" stroke="#a01030" stroke-width="10"/></g>
    <!-- rivets -->
    <g fill="#ffd166">
      <circle cx="40" cy="50" r="2"/><circle cx="120" cy="52" r="2"/><circle cx="200" cy="55" r="2"/><circle cx="280" cy="57" r="2"/><circle cx="360" cy="59" r="2"/>
      <circle cx="40" cy="114" r="2"/><circle cx="120" cy="112" r="2"/><circle cx="200" cy="110" r="2"/><circle cx="280" cy="108" r="2"/><circle cx="360" cy="106" r="2"/>
      <circle cx="40" cy="170" r="2"/><circle cx="120" cy="172" r="2"/><circle cx="200" cy="175" r="2"/><circle cx="280" cy="177" r="2"/><circle cx="360" cy="179" r="2"/>
      <circle cx="40" cy="240" r="2"/><circle cx="120" cy="238" r="2"/><circle cx="200" cy="235" r="2"/><circle cx="280" cy="233" r="2"/><circle cx="360" cy="231" r="2"/>
    </g>
  </g>
  <!-- ladders -->
  <g stroke="#56a8ff" stroke-width="3" fill="none">
    <line x1="60" y1="50" x2="60" y2="115"/><line x1="80" y1="50" x2="80" y2="115"/>
    <line x1="60" y1="68" x2="80" y2="68"/><line x1="60" y1="84" x2="80" y2="84"/><line x1="60" y1="100" x2="80" y2="100"/>
    <line x1="320" y1="115" x2="320" y2="170"/><line x1="340" y1="115" x2="340" y2="170"/>
    <line x1="320" y1="132" x2="340" y2="132"/><line x1="320" y1="148" x2="340" y2="148"/>
    <line x1="100" y1="170" x2="100" y2="240"/><line x1="120" y1="170" x2="120" y2="240"/>
    <line x1="100" y1="190" x2="120" y2="190"/><line x1="100" y1="208" x2="120" y2="208"/><line x1="100" y1="226" x2="120" y2="226"/>
  </g>
  <!-- ape & princess at top -->
  <g transform="translate(180,30)">
    <rect x="0" y="-10" width="60" height="40" fill="#8b3010"/>
    <rect x="5" y="-5" width="50" height="30" fill="#a04020"/>
    <rect x="14" y="0" width="8" height="8" fill="#fff"/><rect x="38" y="0" width="8" height="8" fill="#fff"/>
  </g>
  <g transform="translate(280,40)">
    <rect width="20" height="25" fill="#ff8fb3"/>
    <text x="10" y="12" font-size="10" text-anchor="middle">👸</text>
  </g>
  <!-- barrels -->
  <g>
    <circle cx="180" cy="105" r="11" fill="#8b6242" stroke="#3a1f0a" stroke-width="2"/>
    <circle cx="280" cy="170" r="11" fill="#8b6242" stroke="#3a1f0a" stroke-width="2"/>
    <circle cx="100" cy="232" r="11" fill="#8b6242" stroke="#3a1f0a" stroke-width="2"/>
  </g>
  <!-- player -->
  <g transform="translate(70,108)">
    <rect x="-10" y="-12" width="20" height="22" fill="#56a8ff"/>
    <rect x="-10" y="-16" width="20" height="6" fill="#ffd166"/>
  </g>
</svg>
