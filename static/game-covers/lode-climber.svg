<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0a0810"/>
  <!-- bricks (walls) -->
  <g>
    <rect x="0" y="240" width="400" height="20" fill="#7a4520"/>
    <rect x="0" y="160" width="120" height="20" fill="#7a4520"/>
    <rect x="200" y="160" width="200" height="20" fill="#7a4520"/>
    <rect x="0" y="80" width="280" height="20" fill="#7a4520"/>
    <g stroke="#3a1f0a" stroke-width="1">
      <line x1="40" y1="240" x2="40" y2="260"/><line x1="80" y1="240" x2="80" y2="260"/><line x1="120" y1="240" x2="120" y2="260"/>
      <line x1="160" y1="240" x2="160" y2="260"/><line x1="200" y1="240" x2="200" y2="260"/><line x1="240" y1="240" x2="240" y2="260"/>
      <line x1="280" y1="240" x2="280" y2="260"/><line x1="320" y1="240" x2="320" y2="260"/><line x1="360" y1="240" x2="360" y2="260"/>
      <line x1="0" y1="250" x2="400" y2="250" stroke-width="0.5"/>
    </g>
  </g>
  <!-- ladders -->
  <g stroke="#56a8ff" stroke-width="3" fill="none">
    <line x1="60" y1="100" x2="60" y2="160"/>
    <line x1="80" y1="100" x2="80" y2="160"/>
    <line x1="60" y1="115" x2="80" y2="115"/><line x1="60" y1="130" x2="80" y2="130"/><line x1="60" y1="145" x2="80" y2="145"/>
    <line x1="280" y1="180" x2="280" y2="240"/>
    <line x1="300" y1="180" x2="300" y2="240"/>
    <line x1="280" y1="195" x2="300" y2="195"/><line x1="280" y1="210" x2="300" y2="210"/><line x1="280" y1="225" x2="300" y2="225"/>
  </g>
  <!-- gold -->
  <g>
    <rect x="180" y="148" width="12" height="12" fill="#ffd166"/><rect x="183" y="151" width="6" height="6" fill="#ff8a3d"/>
    <rect x="320" y="68" width="12" height="12" fill="#ffd166"/><rect x="323" y="71" width="6" height="6" fill="#ff8a3d"/>
    <rect x="60" y="228" width="12" height="12" fill="#ffd166"/><rect x="63" y="231" width="6" height="6" fill="#ff8a3d"/>
  </g>
  <!-- enemies -->
  <circle cx="220" cy="150" r="11" fill="#ff3050"/>
  <circle cx="100" cy="70" r="11" fill="#ff3050"/>
  <!-- player on ladder -->
  <g transform="translate(70,140)">
    <rect x="-7" y="-9" width="14" height="18" fill="#56a8ff"/>
    <rect x="-7" y="-12" width="14" height="5" fill="#ffd166"/>
  </g>
  <text x="200" y="30" font-family="monospace" font-weight="bold" font-size="16" fill="#ffd166" text-anchor="middle" letter-spacing="3">LODE CLIMBER</text>
  <text x="20" y="290" font-family="monospace" font-size="11" fill="#ffd166" font-weight="bold">GOLD 5/8 · LIVES 3</text>
</svg>
