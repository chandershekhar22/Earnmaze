<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="ec-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8fb3"/>
      <stop offset="50%" stop-color="#8a5fe3"/>
      <stop offset="100%" stop-color="#2d1a5e"/>
    </linearGradient>
    <linearGradient id="ec-basket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#b07510"/>
    </linearGradient>
    <filter id="ec-glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ec-sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#ec-bg)"/>
  <!-- Stars -->
  <g fill="#fff" opacity="0.4">
    <circle cx="60" cy="40" r="1.5"/><circle cx="350" cy="30" r="1"/>
    <circle cx="200" cy="25" r="1.2"/><circle cx="100" cy="70" r="1"/>
    <circle cx="320" cy="60" r="1.3"/>
  </g>
  <!-- Falling emojis -->
  <g filter="url(#ec-sh)" font-size="46" text-anchor="middle">
    <text x="85" y="80">😀</text>
    <text x="170" y="50">🎉</text>
    <text x="270" y="90">💖</text>
    <text x="340" y="60">⭐</text>
    <text x="120" y="150">🍕</text>
    <text x="230" y="130">🚀</text>
    <text x="320" y="170">🔥</text>
  </g>
  <!-- Motion blur lines (dotted trails) -->
  <g stroke="#fff" stroke-width="1.5" opacity="0.35" stroke-dasharray="3 4" stroke-linecap="round">
    <line x1="85" y1="30" x2="85" y2="50"/>
    <line x1="170" y1="15" x2="170" y2="30"/>
    <line x1="270" y1="40" x2="270" y2="60"/>
    <line x1="120" y1="100" x2="120" y2="120"/>
    <line x1="230" y1="90" x2="230" y2="110"/>
  </g>
  <!-- Basket -->
  <g filter="url(#ec-glow)" transform="translate(200,235)">
    <path d="M-70,0 L70,0 L58,50 Q58,58 50,58 L-50,58 Q-58,58 -58,50 Z" fill="url(#ec-basket)" stroke="#6b4410" stroke-width="2"/>
    <path d="M-70,0 L70,0 L66,10 L-66,10 Z" fill="#c9860d"/>
    <g stroke="#6b4410" stroke-width="1.5" opacity="0.6">
      <line x1="-50" y1="10" x2="-40" y2="55"/>
      <line x1="-20" y1="10" x2="-16" y2="55"/>
      <line x1="10" y1="10" x2="14" y2="55"/>
      <line x1="40" y1="10" x2="40" y2="55"/>
    </g>
    <path d="M-70,0 Q-70,-35 0,-35 Q70,-35 70,0" fill="none" stroke="#c9860d" stroke-width="5" stroke-linecap="round"/>
    <!-- Caught emoji in basket -->
    <text x="-20" y="-2" font-size="30" text-anchor="middle">🍎</text>
    <text x="22" y="-2" font-size="30" text-anchor="middle">💎</text>
  </g>
  <g font-family="monospace" fill="#fff" opacity="0.95">
    <text x="20" y="28" font-size="11">SCORE</text>
    <text x="20" y="52" font-size="24" font-weight="bold" fill="#ffd166">2,480</text>
  </g>
  <g font-family="monospace" fill="#fff" opacity="0.95" text-anchor="end">
    <text x="380" y="28" font-size="11">♥ LIVES</text>
    <text x="380" y="52" font-size="24" font-weight="bold" fill="#ff5f8f">♥♥♥</text>
  </g>
</svg>
