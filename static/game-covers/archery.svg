<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="ar-sky" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#7fb5f7"/>
      <stop offset="100%" stop-color="#13264d"/>
    </radialGradient>
    <filter id="ar-sh"><feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.4"/></filter>
    <filter id="ar-glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#ar-sky)"/>
  <g transform="translate(200,150)" filter="url(#ar-sh)">
    <circle r="120" fill="#ffffff"/>
    <circle r="96" fill="#222"/>
    <circle r="72" fill="#3e7be8"/>
    <circle r="48" fill="#ea3b3b"/>
    <circle r="24" fill="#ffd166"/>
    <circle r="8" fill="#222"/>
    <g stroke="#000" stroke-width="1" opacity="0.25">
      <circle r="120" fill="none"/><circle r="96" fill="none"/><circle r="72" fill="none"/><circle r="48" fill="none"/><circle r="24" fill="none"/>
    </g>
  </g>
  <g filter="url(#ar-glow)">
    <line x1="30" y1="260" x2="205" y2="148" stroke="#6b3a1e" stroke-width="4" stroke-linecap="round"/>
    <polygon points="208,146 195,140 195,156" fill="#bdbdbd" stroke="#555" stroke-width="1"/>
    <g transform="translate(30,260)">
      <rect x="-4" y="-4" width="8" height="8" fill="#ff5f8f" transform="rotate(45)"/>
      <rect x="-3" y="-3" width="6" height="6" fill="#35d39a" transform="rotate(45)"/>
      <rect x="-2" y="-2" width="4" height="4" fill="#ffd166" transform="rotate(45)"/>
    </g>
  </g>
  <g transform="translate(200,150)">
    <circle cx="20" cy="-12" r="5" fill="#fff" opacity="0.5"/>
    <circle cx="-40" cy="30" r="3" fill="#fff" opacity="0.4"/>
  </g>
  <g font-family="monospace" fill="#fff">
    <text x="20" y="30" font-size="11" opacity="0.7">ROUND</text>
    <text x="20" y="52" font-size="22" font-weight="bold">03/05</text>
    <text x="380" y="30" font-size="11" opacity="0.7" text-anchor="end">SCORE</text>
    <text x="380" y="52" font-size="22" font-weight="bold" fill="#ffd166" text-anchor="end">840</text>
  </g>
</svg>
