<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="at-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#050510"/></linearGradient>
    <linearGradient id="at-wall-top" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8fb5ff"/><stop offset="100%" stop-color="#3a5aa0"/></linearGradient>
    <linearGradient id="at-wall-side" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3a5aa0"/><stop offset="100%" stop-color="#1a3070"/></linearGradient>
    <filter id="at-glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#at-bg)"/>
  <!-- 3D maze perspective (simple) -->
  <g>
    <!-- Floor -->
    <polygon points="50,280 350,280 280,150 120,150" fill="#0a1030"/>
    <!-- Left wall -->
    <polygon points="50,280 120,150 120,110 50,240" fill="url(#at-wall-side)"/>
    <polygon points="50,240 120,110 120,90 50,220" fill="url(#at-wall-top)"/>
    <!-- Right wall -->
    <polygon points="350,280 280,150 280,110 350,240" fill="url(#at-wall-side)"/>
    <polygon points="350,240 280,110 280,90 350,220" fill="url(#at-wall-top)"/>
    <!-- Middle wall block -->
    <polygon points="170,200 230,200 215,130 185,130" fill="url(#at-wall-side)"/>
    <polygon points="185,130 215,130 215,120 185,120" fill="url(#at-wall-top)"/>
  </g>
  <!-- Ball (player) with glow -->
  <g filter="url(#at-glow)"><circle cx="200" cy="230" r="10" fill="#ffe066"/><circle cx="197" cy="227" r="3" fill="#fff"/></g>
  <!-- Goal marker -->
  <g filter="url(#at-glow)"><circle cx="200" cy="160" r="8" fill="none" stroke="#4ff0b5" stroke-width="2"/><circle cx="200" cy="160" r="3" fill="#4ff0b5"/></g>
  <g font-family="monospace" fill="#8fb5ff" font-weight="bold"><text x="20" y="28" font-size="11">MAZE</text><text x="20" y="50" font-size="22">04</text></g>
  <g font-family="monospace" fill="#ffe066" text-anchor="end" font-weight="bold"><text x="380" y="28" font-size="11">⏱ 1:24</text></g>
</svg>
