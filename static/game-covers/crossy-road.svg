<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="cr-grass1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <linearGradient id="cr-grass2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <linearGradient id="cr-road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#546e7a"/>
      <stop offset="100%" stop-color="#37474f"/>
    </linearGradient>
    <linearGradient id="cr-car" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
    <linearGradient id="cr-car2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <filter id="cr-shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="transparent"/>
  <!-- Grass strip top -->
  <rect x="0" y="0" width="400" height="55" fill="url(#cr-grass1)"/>
  <g fill="#388e3c" opacity="0.4">
    <rect x="20" y="35" width="4" height="10" rx="2"/><rect x="50" y="30" width="3" height="12" rx="1.5"/>
    <rect x="120" y="38" width="4" height="8" rx="2"/><rect x="200" y="32" width="3" height="11" rx="1.5"/>
    <rect x="280" y="36" width="4" height="9" rx="2"/><rect x="350" y="33" width="3" height="10" rx="1.5"/>
  </g>
  <!-- Road lane 1 -->
  <rect x="0" y="55" width="400" height="50" fill="url(#cr-road)"/>
  <g fill="#fdd835" opacity="0.8">
    <rect x="30" y="78" width="25" height="3" rx="1"/><rect x="80" y="78" width="25" height="3" rx="1"/>
    <rect x="130" y="78" width="25" height="3" rx="1"/><rect x="180" y="78" width="25" height="3" rx="1"/>
    <rect x="230" y="78" width="25" height="3" rx="1"/><rect x="280" y="78" width="25" height="3" rx="1"/>
    <rect x="330" y="78" width="25" height="3" rx="1"/>
  </g>
  <!-- Car 1 (red) -->
  <g transform="translate(250, 65)" filter="url(#cr-shadow)">
    <rect x="0" y="5" width="55" height="30" rx="5" fill="url(#cr-car)"/>
    <rect x="8" y="0" width="35" height="18" rx="4" fill="#ef5350"/>
    <rect x="12" y="3" width="12" height="10" rx="2" fill="#bbdefb" opacity="0.6"/>
    <rect x="28" y="3" width="12" height="10" rx="2" fill="#bbdefb" opacity="0.6"/>
    <circle cx="12" cy="37" r="6" fill="#333"/><circle cx="12" cy="37" r="3" fill="#666"/>
    <circle cx="43" cy="37" r="6" fill="#333"/><circle cx="43" cy="37" r="3" fill="#666"/>
    <rect x="48" y="12" width="6" height="4" rx="2" fill="#ffeb3b"/>
  </g>
  <!-- Grass strip middle -->
  <rect x="0" y="105" width="400" height="40" fill="url(#cr-grass2)"/>
  <g fill="#2e7d32" opacity="0.3">
    <circle cx="60" cy="120" r="8"/><circle cx="65" cy="115" r="6"/>
    <circle cx="300" cy="125" r="7"/><circle cx="307" cy="118" r="5"/>
  </g>
  <!-- Road lane 2 -->
  <rect x="0" y="145" width="400" height="50" fill="url(#cr-road)"/>
  <g fill="#fdd835" opacity="0.8">
    <rect x="15" y="168" width="25" height="3" rx="1"/><rect x="65" y="168" width="25" height="3" rx="1"/>
    <rect x="115" y="168" width="25" height="3" rx="1"/><rect x="165" y="168" width="25" height="3" rx="1"/>
    <rect x="215" y="168" width="25" height="3" rx="1"/><rect x="265" y="168" width="25" height="3" rx="1"/>
    <rect x="315" y="168" width="25" height="3" rx="1"/>
  </g>
  <!-- Car 2 (blue, going other way) -->
  <g transform="translate(80, 152)" filter="url(#cr-shadow)">
    <rect x="0" y="5" width="60" height="32" rx="5" fill="url(#cr-car2)"/>
    <rect x="10" y="0" width="38" height="20" rx="4" fill="#42a5f5"/>
    <rect x="14" y="3" width="13" height="11" rx="2" fill="#bbdefb" opacity="0.6"/>
    <rect x="31" y="3" width="13" height="11" rx="2" fill="#bbdefb" opacity="0.6"/>
    <circle cx="14" cy="39" r="6" fill="#333"/><circle cx="14" cy="39" r="3" fill="#666"/>
    <circle cx="46" cy="39" r="6" fill="#333"/><circle cx="46" cy="39" r="3" fill="#666"/>
    <rect x="-4" y="14" width="6" height="4" rx="2" fill="#ffeb3b"/>
  </g>
  <!-- Grass strip bottom -->
  <rect x="0" y="195" width="400" height="105" fill="url(#cr-grass1)"/>
  <g fill="#388e3c" opacity="0.3">
    <rect x="40" y="220" width="4" height="10" rx="2"/><rect x="150" y="225" width="3" height="8" rx="1.5"/>
    <rect x="260" y="218" width="4" height="11" rx="2"/><rect x="350" y="222" width="3" height="9" rx="1.5"/>
  </g>
  <!-- Chicken (pixel-art style) -->
  <g transform="translate(190, 200)" filter="url(#cr-shadow)">
    <!-- Body -->
    <rect x="-12" y="0" width="24" height="24" rx="3" fill="#fafafa"/>
    <rect x="-10" y="2" width="20" height="20" rx="2" fill="#fff"/>
    <!-- Head -->
    <rect x="-8" y="-14" width="18" height="16" rx="3" fill="#fafafa"/>
    <!-- Eye -->
    <rect x="2" y="-10" width="5" height="5" rx="1" fill="#222"/>
    <rect x="4" y="-9" width="2" height="2" fill="#fff"/>
    <!-- Beak -->
    <rect x="10" y="-6" width="8" height="4" rx="1" fill="#ff8f00"/>
    <rect x="10" y="-2" width="6" height="3" rx="1" fill="#ef6c00"/>
    <!-- Comb -->
    <rect x="-2" y="-18" width="5" height="6" rx="2" fill="#e53935"/>
    <rect x="4" y="-16" width="5" height="5" rx="2" fill="#c62828"/>
    <!-- Legs -->
    <rect x="-6" y="24" width="3" height="8" fill="#ff8f00"/>
    <rect x="5" y="24" width="3" height="8" fill="#ff8f00"/>
    <rect x="-8" y="30" width="7" height="3" rx="1" fill="#ff8f00"/>
    <rect x="3" y="30" width="7" height="3" rx="1" fill="#ff8f00"/>
    <!-- Wing -->
    <rect x="-14" y="4" width="6" height="14" rx="3" fill="#e0e0e0"/>
  </g>
  <!-- Score -->
  <text x="200" y="280" text-anchor="middle" font-family="monospace" font-size="16" fill="#fff" font-weight="bold" opacity="0.5">42</text>
</svg>