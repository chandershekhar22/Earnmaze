<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#2a4a1a"/>
  <!-- grid 9x6 -->
  <g>
    <!-- floor -->
    <rect x="0" y="0" width="400" height="300" fill="#3a5028"/>
    <!-- walls (dark gray with highlight) -->
    <g>
      <g transform="translate(0,0)"><rect width="44" height="44" fill="#5a5a5a"/><rect x="2" y="2" width="40" height="40" fill="#7a7a7a"/></g>
      <g transform="translate(88,0)"><rect width="44" height="44" fill="#5a5a5a"/><rect x="2" y="2" width="40" height="40" fill="#7a7a7a"/></g>
      <g transform="translate(176,0)"><rect width="44" height="44" fill="#5a5a5a"/><rect x="2" y="2" width="40" height="40" fill="#7a7a7a"/></g>
      <g transform="translate(264,0)"><rect width="44" height="44" fill="#5a5a5a"/><rect x="2" y="2" width="40" height="40" fill="#7a7a7a"/></g>
      <g transform="translate(352,0)"><rect width="44" height="44" fill="#5a5a5a"/><rect x="2" y="2" width="40" height="40" fill="#7a7a7a"/></g>
      <g transform="translate(0,88)"><rect width="44" height="44" fill="#5a5a5a"/><rect x="2" y="2" width="40" height="40" fill="#7a7a7a"/></g>
      <g transform="translate(88,88)"><rect width="44" height="44" fill="#5a5a5a"/><rect x="2" y="2" width="40" height="40" fill="#7a7a7a"/></g>
      <g transform="translate(176,88)"><rect width="44" height="44" fill="#5a5a5a"/><rect x="2" y="2" width="40" height="40" fill="#7a7a7a"/></g>
      <g transform="translate(0,176)"><rect width="44" height="44" fill="#5a5a5a"/><rect x="2" y="2" width="40" height="40" fill="#7a7a7a"/></g>
      <g transform="translate(176,176)"><rect width="44" height="44" fill="#5a5a5a"/><rect x="2" y="2" width="40" height="40" fill="#7a7a7a"/></g>
      <g transform="translate(264,176)"><rect width="44" height="44" fill="#5a5a5a"/><rect x="2" y="2" width="40" height="40" fill="#7a7a7a"/></g>
      <g transform="translate(352,176)"><rect width="44" height="44" fill="#5a5a5a"/><rect x="2" y="2" width="40" height="40" fill="#7a7a7a"/></g>
    </g>
    <!-- destructible bricks -->
    <g>
      <g transform="translate(44,44)"><rect x="2" y="2" width="40" height="40" fill="#a06030"/><line x1="2" y1="22" x2="42" y2="22" stroke="#5a3010" stroke-width="2"/></g>
      <g transform="translate(132,44)"><rect x="2" y="2" width="40" height="40" fill="#a06030"/><line x1="2" y1="22" x2="42" y2="22" stroke="#5a3010" stroke-width="2"/></g>
      <g transform="translate(220,132)"><rect x="2" y="2" width="40" height="40" fill="#a06030"/><line x1="2" y1="22" x2="42" y2="22" stroke="#5a3010" stroke-width="2"/></g>
      <g transform="translate(308,132)"><rect x="2" y="2" width="40" height="40" fill="#a06030"/><line x1="2" y1="22" x2="42" y2="22" stroke="#5a3010" stroke-width="2"/></g>
      <g transform="translate(132,220)"><rect x="2" y="2" width="40" height="40" fill="#a06030"/><line x1="2" y1="22" x2="42" y2="22" stroke="#5a3010" stroke-width="2"/></g>
    </g>
  </g>
  <!-- bomb -->
  <g transform="translate(110,110)">
    <circle r="16" fill="#000"/>
    <rect x="-2" y="-22" width="4" height="6" fill="#888"/>
    <circle cx="0" cy="-26" r="3" fill="#ff3050"/>
  </g>
  <!-- explosion -->
  <g opacity="0.9">
    <rect x="222" y="222" width="40" height="40" fill="rgba(255,200,40,0.85)"/>
    <rect x="266" y="222" width="40" height="40" fill="rgba(255,140,40,0.85)"/>
    <rect x="222" y="266" width="40" height="40" fill="rgba(255,140,40,0.85)"/>
  </g>
  <!-- player -->
  <g transform="translate(66,242)">
    <circle r="16" fill="#56a8ff"/>
    <circle cx="-5" cy="-3" r="3" fill="#fff"/><circle cx="5" cy="-3" r="3" fill="#fff"/>
    <circle cx="-5" cy="-3" r="1.5" fill="#000"/><circle cx="5" cy="-3" r="1.5" fill="#000"/>
  </g>
  <!-- enemy -->
  <g transform="translate(330,66)">
    <circle r="16" fill="#ff3050"/>
    <rect x="-5" y="-5" width="3" height="3" fill="#fff"/><rect x="2" y="-5" width="3" height="3" fill="#fff"/>
  </g>
</svg>
