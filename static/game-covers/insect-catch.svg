<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="ic-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#5bbd5b"/>
      <stop offset="100%" stop-color="#1d4f1d"/>
    </radialGradient>
    <linearGradient id="ic-bug" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5f8f"/>
      <stop offset="100%" stop-color="#b12052"/>
    </linearGradient>
    <linearGradient id="ic-bug2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#b87a10"/>
    </linearGradient>
    <filter id="ic-sh"><feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.4"/></filter>
    <filter id="ic-glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#ic-bg)"/>
  <g opacity="0.18">
    <path d="M0,240 Q100,220 200,235 T400,230 L400,300 L0,300 Z" fill="#0a3a0a"/>
  </g>
  <!-- Blades of grass -->
  <g stroke="#9eee9e" stroke-width="1.5" opacity="0.3" fill="none">
    <path d="M30,290 Q32,270 34,260"/><path d="M70,290 Q75,265 70,255"/>
    <path d="M110,290 Q115,270 110,260"/><path d="M340,290 Q342,270 345,260"/>
    <path d="M300,290 Q295,270 302,260"/><path d="M370,290 Q372,270 370,260"/>
  </g>
  <!-- Ladybug -->
  <g filter="url(#ic-sh)" transform="translate(110,130) rotate(-12)">
    <ellipse cx="0" cy="0" rx="32" ry="26" fill="url(#ic-bug)"/>
    <path d="M0,-26 L0,26" stroke="#2b0312" stroke-width="2"/>
    <circle cx="-12" cy="-8" r="4" fill="#1a0109"/>
    <circle cx="10" cy="-4" r="4" fill="#1a0109"/>
    <circle cx="-8" cy="10" r="3.5" fill="#1a0109"/>
    <circle cx="12" cy="12" r="3" fill="#1a0109"/>
    <ellipse cx="0" cy="-28" rx="10" ry="8" fill="#1a0109"/>
    <circle cx="-3" cy="-30" r="1.5" fill="#fff"/>
    <circle cx="3" cy="-30" r="1.5" fill="#fff"/>
    <line x1="-4" y1="-37" x2="-8" y2="-44" stroke="#1a0109" stroke-width="1.5"/>
    <line x1="4" y1="-37" x2="8" y2="-44" stroke="#1a0109" stroke-width="1.5"/>
  </g>
  <!-- Bee -->
  <g filter="url(#ic-sh)" transform="translate(300,90) rotate(15)">
    <ellipse cx="0" cy="0" rx="28" ry="22" fill="url(#ic-bug2)"/>
    <rect x="-22" y="-12" width="10" height="24" fill="#2b1c02"/>
    <rect x="-4" y="-14" width="10" height="28" fill="#2b1c02"/>
    <rect x="14" y="-12" width="8" height="24" fill="#2b1c02"/>
    <ellipse cx="26" cy="-2" rx="8" ry="6" fill="#2b1c02"/>
    <circle cx="25" cy="-3" r="1.5" fill="#fff"/>
    <path d="M5,-22 Q20,-40 0,-30" fill="#fff" opacity="0.7"/>
    <path d="M-5,-22 Q-20,-40 0,-30" fill="#fff" opacity="0.7"/>
  </g>
  <!-- Small bug -->
  <g filter="url(#ic-glow)" transform="translate(250,200)">
    <circle cx="0" cy="0" r="14" fill="#8f7cff"/>
    <circle cx="-4" cy="-3" r="2" fill="#fff"/>
    <circle cx="4" cy="-3" r="2" fill="#fff"/>
    <circle cx="-4" cy="-3" r="1" fill="#000"/>
    <circle cx="4" cy="-3" r="1" fill="#000"/>
    <line x1="-3" y1="-12" x2="-8" y2="-20" stroke="#3a2c70" stroke-width="1.5"/>
    <line x1="3" y1="-12" x2="8" y2="-20" stroke="#3a2c70" stroke-width="1.5"/>
  </g>
  <!-- Cursor/net -->
  <g filter="url(#ic-glow)" transform="translate(180,160)">
    <circle r="30" fill="none" stroke="#fff" stroke-width="3" opacity="0.8"/>
    <line x1="-26" y1="-10" x2="22" y2="20" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
    <line x1="-22" y1="-18" x2="18" y2="28" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
    <line x1="-12" y1="-26" x2="8" y2="30" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
    <line x1="18" y1="-22" x2="-18" y2="22" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
    <circle r="3" fill="#ff5d73"/>
  </g>
  <g font-family="monospace" fill="#fff" opacity="0.9">
    <text x="20" y="30" font-size="12" font-weight="bold">🐞 CATCH 10</text>
    <text x="380" y="30" font-size="14" font-weight="bold" text-anchor="end" fill="#ffd166">⏱ 0:18</text>
  </g>
</svg>
