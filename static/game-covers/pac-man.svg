<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="pm-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a4e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d0d2b" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="pm-pac" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#f0c030"/>
    </radialGradient>
    <radialGradient id="pm-ghost" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </radialGradient>
    <radialGradient id="pm-ghost2" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#0984e3"/>
    </radialGradient>
    <filter id="pm-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#pm-bg)"/>
  <!-- Maze walls -->
  <g stroke="#2233aa" stroke-width="3" fill="none" opacity="0.5">
    <rect x="20" y="20" width="360" height="260" rx="8"/>
    <line x1="20" y1="80" x2="100" y2="80"/>
    <line x1="100" y1="80" x2="100" y2="40"/>
    <rect x="130" y="30" width="60" height="30" rx="4"/>
    <rect x="220" y="30" width="60" height="30" rx="4"/>
    <line x1="300" y1="80" x2="380" y2="80"/>
    <line x1="300" y1="80" x2="300" y2="40"/>
    <rect x="40" y="100" width="50" height="25" rx="4"/>
    <rect x="310" y="100" width="50" height="25" rx="4"/>
    <rect x="40" y="200" width="50" height="25" rx="4"/>
    <rect x="310" y="200" width="50" height="25" rx="4"/>
    <rect x="130" y="220" width="60" height="30" rx="4"/>
    <rect x="220" y="220" width="60" height="30" rx="4"/>
    <line x1="20" y1="170" x2="80" y2="170"/>
    <line x1="320" y1="170" x2="380" y2="170"/>
  </g>
  <!-- Dots trail -->
  <g fill="#ffb142" filter="url(#pm-glow)">
    <circle cx="240" cy="150" r="5"/>
    <circle cx="270" cy="150" r="5"/>
    <circle cx="300" cy="150" r="5"/>
    <circle cx="330" cy="150" r="5"/>
    <circle cx="360" cy="150" r="8" opacity="0.9"/>
  </g>
  <!-- Small dots -->
  <g fill="#ffb142" opacity="0.7">
    <circle cx="160" cy="90" r="3"/>
    <circle cx="200" cy="90" r="3"/>
    <circle cx="240" cy="90" r="3"/>
    <circle cx="160" cy="200" r="3"/>
    <circle cx="200" cy="200" r="3"/>
    <circle cx="240" cy="200" r="3"/>
    <circle cx="120" cy="150" r="3"/>
  </g>
  <!-- Pac-Man -->
  <g filter="url(#pm-glow)">
    <path d="M200,150 L175,125 A50,50 0 1,1 175,175 Z" fill="url(#pm-pac)"/>
    <circle cx="185" cy="132" r="5" fill="#333"/>
  </g>
  <!-- Ghost 1 (red) -->
  <g transform="translate(330, 80)" filter="url(#pm-glow)">
    <path d="M-20,10 Q-20,-20 0,-20 Q20,-20 20,10 L20,25 L14,18 L8,25 L2,18 L-4,25 L-10,18 L-16,25 L-20,18 Z" fill="url(#pm-ghost)"/>
    <circle cx="-6" cy="-5" r="5" fill="#fff"/>
    <circle cx="6" cy="-5" r="5" fill="#fff"/>
    <circle cx="-4" cy="-5" r="2.5" fill="#111"/>
    <circle cx="8" cy="-5" r="2.5" fill="#111"/>
  </g>
  <!-- Ghost 2 (blue) -->
  <g transform="translate(80, 230)" filter="url(#pm-glow)">
    <path d="M-18,8 Q-18,-18 0,-18 Q18,-18 18,8 L18,22 L12,16 L6,22 L0,16 L-6,22 L-12,16 L-18,22 Z" fill="url(#pm-ghost2)"/>
    <circle cx="-5" cy="-4" r="4.5" fill="#fff"/>
    <circle cx="5" cy="-4" r="4.5" fill="#fff"/>
    <circle cx="-3" cy="-4" r="2.2" fill="#111"/>
    <circle cx="7" cy="-4" r="2.2" fill="#111"/>
  </g>
  <!-- Score text -->
  <text x="200" y="280" text-anchor="middle" font-family="monospace" font-size="14" fill="#ffe066" opacity="0.6" font-weight="bold">SCORE: 12450</text>
</svg>