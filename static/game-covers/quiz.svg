<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="qz-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b1d6b"/>
      <stop offset="100%" stop-color="#0d0a2e"/>
    </linearGradient>
    <linearGradient id="qz-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2b8e"/>
      <stop offset="100%" stop-color="#1a135a"/>
    </linearGradient>
    <linearGradient id="qz-correct" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4ff0b5"/><stop offset="100%" stop-color="#1b8a5a"/></linearGradient>
    <linearGradient id="qz-wrong" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff6b8a"/><stop offset="100%" stop-color="#a02040"/></linearGradient>
    <linearGradient id="qz-opt" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4b3fa0"/><stop offset="100%" stop-color="#2b1f70"/></linearGradient>
    <filter id="qz-sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.45"/></filter>
    <filter id="qz-glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#qz-bg)"/>
  <g opacity="0.07" font-family="'Segoe UI',Arial" font-size="80" fill="#fff">
    <text x="30" y="110">?</text><text x="300" y="260">?</text>
    <text x="340" y="80">?</text><text x="20" y="250">?</text>
  </g>
  <!-- Question card -->
  <g filter="url(#qz-sh)">
    <rect x="40" y="30" width="320" height="70" rx="12" fill="url(#qz-card)" stroke="#5a4fc0" stroke-width="1"/>
    <circle cx="60" cy="50" r="8" fill="#ffd166"/>
    <text x="60" y="55" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="12" font-weight="bold" fill="#4a3410">Q</text>
    <text x="80" y="55" font-family="'Segoe UI',Arial" font-size="13" fill="#9d93ff" font-weight="bold">QUESTION 7 / 10</text>
    <text x="80" y="82" font-family="'Segoe UI',Arial" font-size="17" fill="#fff" font-weight="bold">Which planet is the red one?</text>
  </g>
  <!-- Answer options -->
  <g filter="url(#qz-sh)">
    <g transform="translate(40,120)">
      <rect width="150" height="44" rx="10" fill="url(#qz-opt)"/>
      <circle cx="22" cy="22" r="12" fill="#56a8ff"/>
      <text x="22" y="27" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#fff">A</text>
      <text x="42" y="27" font-family="'Segoe UI',Arial" font-size="13" fill="#fff">Venus</text>
    </g>
    <g transform="translate(210,120)" filter="url(#qz-glow)">
      <rect width="150" height="44" rx="10" fill="url(#qz-correct)"/>
      <circle cx="22" cy="22" r="12" fill="#fff"/>
      <text x="22" y="27" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#1b5a36">B</text>
      <text x="42" y="27" font-family="'Segoe UI',Arial" font-size="13" fill="#fff" font-weight="bold">Mars ✓</text>
    </g>
    <g transform="translate(40,174)">
      <rect width="150" height="44" rx="10" fill="url(#qz-opt)"/>
      <circle cx="22" cy="22" r="12" fill="#ff8fa8"/>
      <text x="22" y="27" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#fff">C</text>
      <text x="42" y="27" font-family="'Segoe UI',Arial" font-size="13" fill="#fff">Jupiter</text>
    </g>
    <g transform="translate(210,174)">
      <rect width="150" height="44" rx="10" fill="url(#qz-opt)"/>
      <circle cx="22" cy="22" r="12" fill="#ffd166"/>
      <text x="22" y="27" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#4a3410">D</text>
      <text x="42" y="27" font-family="'Segoe UI',Arial" font-size="13" fill="#fff">Saturn</text>
    </g>
  </g>
  <!-- Timer ring -->
  <g transform="translate(55,255)">
    <circle r="22" fill="none" stroke="#2a1f58" stroke-width="4"/>
    <circle r="22" fill="none" stroke="#ffd166" stroke-width="4" stroke-dasharray="86 52" stroke-dashoffset="-20" transform="rotate(-90)" stroke-linecap="round"/>
    <text y="5" text-anchor="middle" font-family="monospace" font-size="15" fill="#fff" font-weight="bold">08</text>
  </g>
  <!-- Score -->
  <g transform="translate(340,255)" text-anchor="end">
    <text x="0" y="-8" font-family="monospace" font-size="10" fill="#9d93ff">SCORE</text>
    <text x="0" y="14" font-family="monospace" font-size="22" fill="#4ff0b5" font-weight="bold">+120</text>
  </g>
  <g transform="translate(200,260)" text-anchor="middle">
    <text font-family="monospace" font-size="11" fill="#fff" opacity="0.6">STREAK 🔥 5</text>
  </g>
</svg>
