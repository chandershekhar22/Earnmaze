<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="hm-wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="50%" stop-color="#a1887f"/>
      <stop offset="100%" stop-color="#795548"/>
    </linearGradient>
    <linearGradient id="hm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#263238" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#37474f" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="hm-shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#hm-bg)"/>
  <!-- Gallows structure -->
  <g filter="url(#hm-shadow)">
    <!-- Base -->
    <rect x="60" y="250" width="160" height="12" rx="3" fill="url(#hm-wood)"/>
    <!-- Vertical post -->
    <rect x="100" y="40" width="14" height="215" rx="2" fill="url(#hm-wood)"/>
    <!-- Horizontal beam -->
    <rect x="100" y="40" width="130" height="12" rx="2" fill="url(#hm-wood)"/>
    <!-- Support brace -->
    <path d="M114,55 L114,95 L154,55Z" fill="none" stroke="#795548" stroke-width="6" stroke-linejoin="round"/>
    <!-- Rope -->
    <line x1="220" y1="52" x2="220" y2="85" stroke="#d7ccc8" stroke-width="3"/>
  </g>
  <!-- Stick figure -->
  <g stroke="#e0e0e0" stroke-width="3" stroke-linecap="round" fill="none">
    <!-- Head -->
    <circle cx="220" cy="100" r="16" fill="none" stroke-width="3"/>
    <!-- Eyes (X eyes for dramatic effect) -->
    <line x1="213" y1="95" x2="217" y2="99" stroke-width="2"/>
    <line x1="217" y1="95" x2="213" y2="99" stroke-width="2"/>
    <line x1="223" y1="95" x2="227" y2="99" stroke-width="2"/>
    <line x1="227" y1="95" x2="223" y2="99" stroke-width="2"/>
    <!-- Mouth -->
    <path d="M214,108 Q220,104 226,108" stroke-width="1.5"/>
    <!-- Body -->
    <line x1="220" y1="116" x2="220" y2="175"/>
    <!-- Left arm -->
    <line x1="220" y1="135" x2="190" y2="155"/>
    <!-- Right arm -->
    <line x1="220" y1="135" x2="250" y2="155"/>
    <!-- Left leg -->
    <line x1="220" y1="175" x2="195" y2="210"/>
    <!-- Right leg -->
    <line x1="220" y1="175" x2="245" y2="210"/>
  </g>
  <!-- Letter blanks -->
  <g transform="translate(55, 275)">
    <line x1="0" y1="0" x2="25" y2="0" stroke="#90a4ae" stroke-width="3" stroke-linecap="round"/>
    <text x="12" y="-8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#e0e0e0" font-weight="bold">H</text>
    <line x1="35" y1="0" x2="60" y2="0" stroke="#90a4ae" stroke-width="3" stroke-linecap="round"/>
    <line x1="70" y1="0" x2="95" y2="0" stroke="#90a4ae" stroke-width="3" stroke-linecap="round"/>
    <text x="82" y="-8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#e0e0e0" font-weight="bold">N</text>
    <line x1="105" y1="0" x2="130" y2="0" stroke="#90a4ae" stroke-width="3" stroke-linecap="round"/>
    <text x="117" y="-8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#e0e0e0" font-weight="bold">G</text>
    <line x1="140" y1="0" x2="165" y2="0" stroke="#90a4ae" stroke-width="3" stroke-linecap="round"/>
    <line x1="175" y1="0" x2="200" y2="0" stroke="#90a4ae" stroke-width="3" stroke-linecap="round"/>
    <text x="187" y="-8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#e0e0e0" font-weight="bold">A</text>
    <line x1="210" y1="0" x2="235" y2="0" stroke="#90a4ae" stroke-width="3" stroke-linecap="round"/>
    <text x="222" y="-8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#e0e0e0" font-weight="bold">N</text>
  </g>
  <!-- Wrong letters -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ef5350" text-anchor="middle" opacity="0.7">
    <text x="310" y="80">X</text><text x="330" y="80">Z</text><text x="350" y="80">Q</text>
    <text x="310" y="100">W</text><text x="330" y="100">J</text><text x="350" y="100">K</text>
  </g>
  <!-- Wrong letters label -->
  <text x="330" y="60" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#90a4ae" opacity="0.6">WRONG</text>
</svg>