stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # Image will be tagged as: registry.gitlab.com/<your-namespace>/em-panel:latest
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# Build and push Docker image
build-docker:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Build the image
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
    # Push both tags
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  rules:
    # Build on main/master branch
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
    # Build on tags
    - if: '$CI_COMMIT_TAG'
    # Build on merge requests (optional)
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  tags:
    - docker

# Optional: Build tagged releases with version
build-release:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG -t $IMAGE_LATEST .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    - docker push $IMAGE_LATEST
  only:
    - tags
  tags:
    - docker

